<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espéculo(ar) — nebulosa colectiva</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital@0;1&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050505; }
  body { font-family: 'Space Mono', monospace; color: #888; }

  #canvas-container { position: fixed; inset: 0; z-index: 1; }
  canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }

  #overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 2;
    padding: 2rem;
    display: flex; flex-direction: column; justify-content: space-between;
    mix-blend-mode: screen;
  }
  .header-bar { display: flex; justify-content: space-between; align-items: flex-start; }
  .titulo { font-size: 11px; letter-spacing: 0.2em; color: #666; }
  .subtitulo { font-size: 10px; letter-spacing: 0.1em; color: #444; margin-top: 6px; font-style: italic; }
  .contador { text-align: right; }
  .n-respuestas { font-size: 42px; font-weight: 300; color: #aaa; line-height: 1; }
  .n-label { font-size: 9px; color: #444; letter-spacing: 0.2em; margin-top: 4px; }

  .footer-bar { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1rem; }
  .leyenda { display: flex; flex-wrap: wrap; gap: 12px; max-width: 70%; }
  .leyenda-item { display: flex; align-items: center; gap: 6px; font-size: 9px; color: #555; letter-spacing: 0.05em; }
  .leyenda-dot { width: 8px; height: 8px; border-radius: 50%; }

  .estado { text-align: right; }
  .estado-dot { width: 5px; height: 5px; border-radius: 50%; background: #1a1a1a; display: inline-block; margin-right: 6px; vertical-align: middle; }
  .estado-dot.vivo { background: #1D9E75; box-shadow: 0 0 8px rgba(29, 158, 117, 0.4); }
  .estado-texto { font-size: 9px; color: #444; letter-spacing: 0.15em; }

  /* Modal con el relato */
  #modal {
    position: fixed; inset: 0; z-index: 100;
    display: none; align-items: center; justify-content: center;
    background: rgba(5, 5, 5, 0.85); padding: 2rem;
    backdrop-filter: blur(8px);
  }
  #modal.activo { display: flex; }
  .modal-contenido {
    background: #0d0d0d; border: 0.5px solid #222;
    max-width: 640px; width: 100%; padding: 2.5rem;
    max-height: 80vh; overflow-y: auto;
    color: #ccc; font-family: 'Space Mono', monospace; font-size: 14px; line-height: 1.7;
  }
  .modal-categorias {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem;
  }
  .modal-cat-chip {
    font-size: 10px; padding: 4px 10px; border-radius: 12px;
    letter-spacing: 0.05em; color: #fff;
  }
  .modal-relato { white-space: pre-wrap; color: #ddd; }
  .modal-cerrar {
    position: absolute; top: 1.5rem; right: 2rem;
    background: transparent; border: none; color: #666;
    font-size: 16px; cursor: pointer; font-family: inherit;
  }
  .modal-cerrar:hover { color: #ddd; }

  /* Responsive: mobile */
  @media (max-width: 640px) {
    #overlay { padding: 1.25rem; }
    .n-respuestas { font-size: 32px; }
    .leyenda { max-width: 100%; gap: 8px; }
    .leyenda-item { font-size: 8px; }
    .modal-contenido { padding: 1.5rem; font-size: 13px; }
  }
</style>
</head>
<body>

<div id="canvas-container">
  <canvas id="lienzo" aria-label="Nebulosa colectiva del corpus de Espéculo(ar)"></canvas>
</div>

<div id="overlay">
  <div class="header-bar">
    <div>
      <div class="titulo">ESPÉCULO(AR)</div>
      <div class="subtitulo">nebulosa colectiva · tecnologías de género</div>
    </div>
    <div class="contador">
      <div class="n-respuestas" id="n-respuestas">—</div>
      <div class="n-label">VOCES</div>
    </div>
  </div>

  <div class="footer-bar">
    <div class="leyenda" id="leyenda"></div>
    <div class="estado">
      <span class="estado-dot" id="estado-dot"></span>
      <span class="estado-texto" id="estado-texto">conectando</span>
    </div>
  </div>
</div>

<div id="modal" role="dialog" aria-modal="true">
  <div class="modal-contenido">
    <button class="modal-cerrar" onclick="cerrarModal()" aria-label="Cerrar">cerrar</button>
    <div class="modal-categorias" id="modal-cats"></div>
    <div class="modal-relato" id="modal-texto"></div>
  </div>
</div>

<script>
// ============================================================
// CONFIGURACIÓN
// ============================================================
const API_BASE = 'https://especuloar-exp2.onrender.com';
const POLL_INTERVAL = 5000;

const CATEGORIAS = {
  'dolor_fisico':              { color: '#E8453A', nombre: 'dolor físico' },
  'frio_metal':                { color: '#5A8FD4', nombre: 'frío · metal' },
  'materiales_agradables':     { color: '#E8935A', nombre: 'materiales cálidos' },
  'miedo_ansiedad':            { color: '#9E9E9E', nombre: 'miedo · ansiedad' },
  'sensaciones_agradables':    { color: '#D4847A', nombre: 'seguridad · calma' },
  'normalizacion':             { color: '#6BBF8A', nombre: 'normalización' },
  'vivencia_sexual_traumatica':{ color: '#9B6BBF', nombre: 'vivencia traumática' },
  'profesional_masculino':     { color: '#1A3A6B', nombre: 'profesional masculino' },
  'profesional_femenino':      { color: '#D4B800', nombre: 'profesional femenina' }
};

// ============================================================
// CANVAS
// ============================================================
const canvas = document.getElementById('lienzo');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;

function ajustarCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
}
ajustarCanvas();
window.addEventListener('resize', ajustarCanvas);

// ============================================================
// PINTITAS — modelo de partículas con atracción por color
// ============================================================
class Pintita {
  constructor(id, respuestaId, categoria, intensidad) {
    this.id = id;
    this.respuestaId = respuestaId;
    this.categoria = categoria;
    this.intensidad = intensidad;
    this.color = CATEGORIAS[categoria]?.color || '#888';
    this.rgb = hexToRgb(this.color);

    // Posición inicial completamente aleatoria
    this.x = Math.random() * W;
    this.y = Math.random() * H;

    // Velocidad inicial mínima
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;

    // Tamaño: base + variación según intensidad
    this.radio = 8 + intensidad * 12 + Math.random() * 4;

    // Fase de respiración propia
    this.fase = Math.random() * Math.PI * 2;
    this.velFase = 0.0008 + Math.random() * 0.0006;

    // Vida: para fade-in al aparecer
    this.edad = 0;
  }

  actualizar(dt, pintitas, hoverX, hoverY) {
    this.edad += dt;

    // Atracción gravitatoria hacia pintitas del mismo color
    let ax = 0, ay = 0;
    let vecinas = 0;

    for (const otra of pintitas) {
      if (otra === this || otra.categoria !== this.categoria) continue;
      const dx = otra.x - this.x;
      const dy = otra.y - this.y;
      const distSq = dx * dx + dy * dy;
      const dist = Math.sqrt(distSq);

      if (dist < 250 && dist > 0.1) {
        // Atracción a distancia media
        const fuerza = 0.0008;
        ax += (dx / dist) * fuerza;
        ay += (dy / dist) * fuerza;
        vecinas++;

        // Repulsión muy cercana para no apilarse exactamente
        if (dist < 25) {
          const repulsion = 0.04 * (25 - dist) / 25;
          ax -= (dx / dist) * repulsion;
          ay -= (dy / dist) * repulsion;
        }
      }
    }

    // Repulsión sutil entre colores distintos (que no se mezclen del todo)
    for (const otra of pintitas) {
      if (otra === this || otra.categoria === this.categoria) continue;
      const dx = otra.x - this.x;
      const dy = otra.y - this.y;
      const distSq = dx * dx + dy * dy;
      if (distSq < 1600 && distSq > 0.1) {
        const dist = Math.sqrt(distSq);
        const repulsion = 0.0008 * (40 - dist) / 40;
        ax -= (dx / dist) * repulsion;
        ay -= (dy / dist) * repulsion;
      }
    }

    // Repulsión del cursor si está cerca (efecto sutil)
    if (hoverX !== null) {
      const dx = this.x - hoverX;
      const dy = this.y - hoverY;
      const distSq = dx * dx + dy * dy;
      if (distSq < 6400 && distSq > 0.1) {
        const dist = Math.sqrt(distSq);
        const fuerza = 0.04 * (80 - dist) / 80;
        ax += (dx / dist) * fuerza;
        ay += (dy / dist) * fuerza;
      }
    }

    // Ruido browniano leve para movimiento orgánico
    ax += (Math.random() - 0.5) * 0.008;
    ay += (Math.random() - 0.5) * 0.008;

    // Integrar velocidad
    this.vx = (this.vx + ax) * 0.985;
    this.vy = (this.vy + ay) * 0.985;

    // Limitar velocidad máxima (mantener deriva lenta)
    const velMax = 0.6;
    const vel = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (vel > velMax) {
      this.vx = (this.vx / vel) * velMax;
      this.vy = (this.vy / vel) * velMax;
    }

    // Mover
    this.x += this.vx;
    this.y += this.vy;

    // Mantener dentro del canvas con margen
    const margen = 20;
    if (this.x < margen) { this.x = margen; this.vx = Math.abs(this.vx) * 0.5; }
    if (this.x > W - margen) { this.x = W - margen; this.vx = -Math.abs(this.vx) * 0.5; }
    if (this.y < margen) { this.y = margen; this.vy = Math.abs(this.vy) * 0.5; }
    if (this.y > H - margen) { this.y = H - margen; this.vy = -Math.abs(this.vy) * 0.5; }

    // Respiración
    this.fase += this.velFase * dt;
  }

  dibujar(ctx) {
    const respira = Math.sin(this.fase) * 2;
    const radio = Math.max(1, this.radio + respira);

    // Fade-in en los primeros 2 segundos
    const opacidadFade = Math.min(1, this.edad / 2000);
    const opacidadBase = 0.25 + this.intensidad * 0.35;
    const opacidad = opacidadBase * opacidadFade;

    // Gradiente radial suave
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, radio);
    grad.addColorStop(0,   `rgba(${this.rgb.r}, ${this.rgb.g}, ${this.rgb.b}, ${opacidad})`);
    grad.addColorStop(0.5, `rgba(${this.rgb.r}, ${this.rgb.g}, ${this.rgb.b}, ${opacidad * 0.5})`);
    grad.addColorStop(1,   `rgba(${this.rgb.r}, ${this.rgb.g}, ${this.rgb.b}, 0)`);

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, radio, 0, Math.PI * 2);
    ctx.fill();
  }

  contiene(x, y) {
    const dx = x - this.x;
    const dy = y - this.y;
    return Math.sqrt(dx * dx + dy * dy) < this.radio;
  }
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return { r, g, b };
}

// ============================================================
// ESTADO GLOBAL
// ============================================================
const pintitas = [];
const pintitasMap = new Map();
let ultimoTiempo = performance.now();
let hoverX = null, hoverY = null;

// ============================================================
// LOOP DE RENDER
// ============================================================
function render() {
  const ahora = performance.now();
  const dt = Math.min(50, ahora - ultimoTiempo);
  ultimoTiempo = ahora;

  // Fondo con persistencia leve (efecto acuoso)
  ctx.fillStyle = 'rgba(5, 5, 5, 0.06)';
  ctx.fillRect(0, 0, W, H);

  // Actualizar y dibujar
  for (const p of pintitas) {
    p.actualizar(dt, pintitas, hoverX, hoverY);
    p.dibujar(ctx);
  }

  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// ============================================================
// INTERACCIÓN: hover y click
// ============================================================
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  hoverX = e.clientX - rect.left;
  hoverY = e.clientY - rect.top;
});

canvas.addEventListener('mouseleave', () => {
  hoverX = null;
  hoverY = null;
});

canvas.addEventListener('click', async (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  // Buscar pintita más cercana (de las que contienen el punto)
  let target = null;
  let mejorDist = Infinity;
  for (const p of pintitas) {
    if (p.contiene(x, y)) {
      const dx = x - p.x;
      const dy = y - p.y;
      const d = dx * dx + dy * dy;
      if (d < mejorDist) {
        mejorDist = d;
        target = p;
      }
    }
  }

  if (target) {
    await abrirRelato(target.respuestaId);
  }
});

// Touch para móvil
canvas.addEventListener('touchstart', async (e) => {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const x = touch.clientX - rect.left;
  const y = touch.clientY - rect.top;

  let target = null;
  let mejorDist = Infinity;
  for (const p of pintitas) {
    if (p.contiene(x, y)) {
      const dx = x - p.x;
      const dy = y - p.y;
      const d = dx * dx + dy * dy;
      if (d < mejorDist) {
        mejorDist = d;
        target = p;
      }
    }
  }
  if (target) {
    e.preventDefault();
    await abrirRelato(target.respuestaId);
  }
}, { passive: false });

// ============================================================
// MODAL CON RELATO
// ============================================================
async function abrirRelato(respuestaId) {
  try {
    const res = await fetch(`${API_BASE}/relato/${respuestaId}`);
    const data = await res.json();
    if (data.status === 'error') return;

    document.getElementById('modal-texto').textContent = data.relato || '(sin contenido)';

    const cats = data.categorias_activadas || {};
    const chips = Object.keys(cats).map(cat => {
      const info = CATEGORIAS[cat] || { color: '#888', nombre: cat };
      return `<span class="modal-cat-chip" style="background:${info.color}">${info.nombre}</span>`;
    }).join('');
    document.getElementById('modal-cats').innerHTML = chips;

    document.getElementById('modal').classList.add('activo');
  } catch(e) {
    console.error('Error abriendo relato:', e);
  }
}

function cerrarModal() {
  document.getElementById('modal').classList.remove('activo');
}

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') cerrarModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') cerrarModal();
});

// ============================================================
// LEYENDA
// ============================================================
function actualizarLeyenda() {
  const cont = document.getElementById('leyenda');
  cont.innerHTML = Object.entries(CATEGORIAS).map(([k, v]) =>
    `<div class="leyenda-item"><span class="leyenda-dot" style="background:${v.color}"></span>${v.nombre}</div>`
  ).join('');
}
actualizarLeyenda();

// ============================================================
// CONEXIÓN AL SERVIDOR
// ============================================================
let ultimaPintitaId = 0;

async function inicializar() {
  try {
    const res = await fetch(`${API_BASE}/pintitas_recientes?n=500`);
    const data = await res.json();

    // Cargar todas las pintitas existentes (ordenadas de más reciente a más antigua)
    // Las invertimos para que se carguen en orden cronológico
    data.reverse();
    for (const p of data) {
      if (!pintitasMap.has(p.id)) {
        const pintita = new Pintita(p.id, p.respuesta_id, p.categoria, p.intensidad);
        pintitas.push(pintita);
        pintitasMap.set(p.id, pintita);
        if (p.id > ultimaPintitaId) ultimaPintitaId = p.id;
      }
    }

    actualizarEstado();
  } catch(e) {
    console.error('Error inicializando:', e);
    marcarSinConexion();
  }
}

async function consultarNuevas() {
  try {
    const res = await fetch(`${API_BASE}/pintitas_recientes?n=50`);
    const data = await res.json();

    // Agregar solo las nuevas (id mayor a la última conocida)
    const nuevas = data.filter(p => p.id > ultimaPintitaId);
    nuevas.reverse(); // cronológico

    for (const p of nuevas) {
      if (!pintitasMap.has(p.id)) {
        // Aparición escalonada para que se vea el proceso
        setTimeout(() => {
          const pintita = new Pintita(p.id, p.respuesta_id, p.categoria, p.intensidad);
          pintitas.push(pintita);
          pintitasMap.set(p.id, pintita);
        }, Math.random() * 1500);

        if (p.id > ultimaPintitaId) ultimaPintitaId = p.id;
      }
    }

    actualizarEstado();
  } catch(e) {
    marcarSinConexion();
  }
}

async function actualizarEstado() {
  try {
    const res = await fetch(`${API_BASE}/estado`);
    const data = await res.json();
    document.getElementById('n-respuestas').textContent = data.total_respuestas;
    document.getElementById('estado-dot').classList.add('vivo');
    document.getElementById('estado-texto').textContent = 'corpus activo';
  } catch(e) {
    marcarSinConexion();
  }
}

function marcarSinConexion() {
  document.getElementById('estado-dot').classList.remove('vivo');
  document.getElementById('estado-texto').textContent = 'sin conexión';
}

// Arranque
inicializar();
setInterval(consultarNuevas, POLL_INTERVAL);
</script>
</body>
</html>
