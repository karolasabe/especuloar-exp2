<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espéculo(ar) — nebulosa colectiva</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital@0;1&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050505; }
  body { font-family: 'Space Mono', monospace; color: #888; }

  #canvas-container { position: fixed; inset: 0; z-index: 1; }
  canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }

  #overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 2;
    padding: 2rem;
    display: flex; flex-direction: column; justify-content: space-between;
    mix-blend-mode: screen;
  }
  .header-bar { display: flex; justify-content: space-between; align-items: flex-start; }
  .titulo { font-size: 11px; letter-spacing: 0.2em; color: #666; }
  .subtitulo { font-size: 10px; letter-spacing: 0.1em; color: #444; margin-top: 6px; font-style: italic; }
  .contador { text-align: right; }
  .n-respuestas { font-size: 42px; font-weight: 300; color: #aaa; line-height: 1; }
  .n-label { font-size: 9px; color: #444; letter-spacing: 0.2em; margin-top: 4px; }

  .footer-bar { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1rem; }
  .leyenda {
    display: flex; flex-wrap: wrap; gap: 10px 16px; max-width: 78%;
    pointer-events: auto;
  }
  .leyenda-item {
    display: flex; align-items: center; gap: 7px;
    font-size: 9.5px; color: #888; letter-spacing: 0.05em;
    cursor: pointer; user-select: none;
    padding: 3px 2px;
    transition: opacity 0.2s, color 0.2s;
  }
  .leyenda-item:hover { color: #ccc; }
  .leyenda-item.apagado { opacity: 0.32; }
  .leyenda-item.apagado .leyenda-dot { opacity: 0.4; }
  .leyenda-dot {
    width: 9px; height: 9px; border-radius: 50%;
    transition: opacity 0.2s;
  }

  .estado { text-align: right; }
  .estado-dot { width: 5px; height: 5px; border-radius: 50%; background: #1a1a1a; display: inline-block; margin-right: 6px; vertical-align: middle; }
  .estado-dot.vivo { background: #1D9E75; box-shadow: 0 0 8px rgba(29, 158, 117, 0.4); }
  .estado-texto { font-size: 9px; color: #444; letter-spacing: 0.15em; }

  .pista {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    padding: 1rem 1.5rem; font-size: 9px; color: #444; letter-spacing: 0.2em;
    pointer-events: none; z-index: 3;
    opacity: 0.6;
  }

  /* Modal con el relato */
  #modal {
    position: fixed; inset: 0; z-index: 100;
    display: none; align-items: center; justify-content: center;
    background: rgba(5, 5, 5, 0.88); padding: 2rem;
    backdrop-filter: blur(8px);
  }
  #modal.activo { display: flex; }
  .modal-contenido {
    background: #0d0d0d; border: 0.5px solid #222;
    max-width: 640px; width: 100%; padding: 2.5rem;
    max-height: 80vh; overflow-y: auto;
    color: #ccc; font-family: 'Space Mono', monospace; font-size: 14px; line-height: 1.7;
    position: relative;
  }
  .modal-categorias { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
  .modal-cat-chip { font-size: 10px; padding: 4px 10px; border-radius: 12px; letter-spacing: 0.05em; color: #fff; }
  .modal-relato { white-space: pre-wrap; color: #ddd; }
  .modal-cerrar {
    position: absolute; top: 1rem; right: 1.5rem;
    background: transparent; border: none; color: #666;
    font-size: 11px; cursor: pointer; font-family: inherit;
    letter-spacing: 0.1em;
  }
  .modal-cerrar:hover { color: #ddd; }

  @media (max-width: 640px) {
    #overlay { padding: 1.25rem; }
    .n-respuestas { font-size: 32px; }
    .leyenda { max-width: 100%; gap: 8px; }
    .leyenda-item { font-size: 8px; }
    .modal-contenido { padding: 1.5rem; font-size: 13px; }
    .pista { font-size: 8px; padding: 0.75rem; }
  }
</style>
</head>
<body>

<div id="canvas-container">
  <canvas id="lienzo" aria-label="Nebulosa colectiva de Espéculo(ar)"></canvas>
</div>

<div id="overlay">
  <div class="header-bar">
    <div>
      <div class="titulo">ESPÉCULO(AR)</div>
      <div class="subtitulo">nebulosa colectiva · tecnologías de género</div>
    </div>
    <div class="contador">
      <div class="n-respuestas" id="n-respuestas">—</div>
      <div class="n-label">VOCES</div>
    </div>
  </div>

  <div class="footer-bar">
    <div class="leyenda" id="leyenda"></div>
    <div class="estado">
      <span class="estado-dot" id="estado-dot"></span>
      <span class="estado-texto" id="estado-texto">conectando</span>
    </div>
  </div>
</div>

<div class="pista">agita sobre una masa para revelar las voces · click en categoría: ocultar · shift+click: aislar</div>

<div id="modal" role="dialog" aria-modal="true">
  <div class="modal-contenido">
    <button class="modal-cerrar" onclick="cerrarModal()" aria-label="Cerrar">cerrar</button>
    <div class="modal-categorias" id="modal-cats"></div>
    <div class="modal-relato" id="modal-texto"></div>
  </div>
</div>

<script>
// ============================================================
// CONFIGURACIÓN
// ============================================================
const API_BASE = 'https://especuloar-exp2.onrender.com';
const POLL_INTERVAL = 5000;

const CATEGORIAS = {
  'dolor_fisico':              { color: '#FF2424', nombre: 'Dolor físico' },
  'frio_metal':                { color: '#2EC4D8', nombre: 'Materiales desagradables/fríos' },
  'materiales_agradables':     { color: '#E8935A', nombre: 'Materiales agradables / cálidos' },
  'miedo_ansiedad':            { color: '#8B1A2F', nombre: 'Miedo / ansiedad / preocupación' },
  'sensaciones_agradables':    { color: '#D4847A', nombre: 'Sensaciones agradables / seguridad / calma' },
  'normalizacion':             { color: '#6BBF8A', nombre: 'Normalización / resignación' },
  'vivencia_sexual_traumatica':{ color: '#8B1AE8', nombre: 'Violencia sexual' },
  'profesional_masculino':     { color: '#9E9E9E', nombre: 'Profesional de salud masculino presente' },
  'profesional_femenino':      { color: '#D4B800', nombre: 'Profesional mujer' }
};

// Estado de filtros: true = visible, false = oculta
const filtrosActivos = {};
for (const cat of Object.keys(CATEGORIAS)) filtrosActivos[cat] = true;

const MAX_CATEGORIAS = Object.keys(CATEGORIAS).length; // 9

// Zonas radiales por categoría
let ZONAS = {};
function calcularZonas() {
  const cx = W * 0.5, cy = H * 0.5;
  const radio = Math.min(W, H) * 0.26;
  const cats = Object.keys(CATEGORIAS);
  ZONAS = {};
  cats.forEach((cat, i) => {
    const angulo = (i / cats.length) * Math.PI * 2 - Math.PI / 2;
    ZONAS[cat] = {
      x: cx + Math.cos(angulo) * radio,
      y: cy + Math.sin(angulo) * radio
    };
  });
}

// ============================================================
// CANVAS
// ============================================================
const canvas = document.getElementById('lienzo');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;

function ajustarCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
  calcularZonas();
  if (typeof pintitas !== 'undefined') {
    for (const p of pintitas) p.recalcularBase();
  }
}

// ============================================================
// PINTITA — partícula nebulosa
// ============================================================
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return { r, g, b };
}

// Tamaño y opacidad uniformes para todas las pintitas
// Opacidad calibrada para que los colores se distingan sin diluirse a blanco
const RADIO_UNIFORME = 75;
const OPACIDAD_UNIFORME = 0.075;

class Pintita {
  constructor(id, respuestaId, categoria, esNueva = false) {
    this.id = id;
    this.respuestaId = respuestaId;
    this.categoria = categoria;

    this.color = CATEGORIAS[categoria]?.color || '#888';
    this.rgb = hexToRgb(this.color);

    // Semilla angular y radial: distribución pareja para formar un área amplia
    this.semillaAng = Math.random() * Math.PI * 2;
    this.semillaRad = Math.sqrt(Math.random());

    this.bx = 0; this.by = 0;
    this.recalcularBase();
    this.x = this.bx; this.y = this.by;

    // Offset por repulsión y dinámica
    this.ox = 0; this.oy = 0;
    this.ovx = 0; this.ovy = 0;

    // Si es una pintita nueva (llega desde el webhook), aparece en posición
    // aleatoria dentro del canvas y viaja lentamente hacia su masa de color
    if (esNueva) {
      const xRandom = Math.random() * W;
      const yRandom = Math.random() * H;
      this.ox = xRandom - this.bx;
      this.oy = yRandom - this.by;
    }

    this.radioBase = RADIO_UNIFORME;
    this.opacidadBase = OPACIDAD_UNIFORME;

    // Filtro: opacidad multiplicativa controlada por las categorías visibles
    this.opacidadFiltro = 1;
    this.opacidadFiltroObjetivo = filtrosActivos[categoria] ? 1 : 0;

    // Respiración propia con amplio rango de frecuencias (organismo asimétrico)
    this.fase = Math.random() * Math.PI * 2;
    this.velFase = 0.00025 + Math.random() * 0.0009;

    this.edad = 0;
  }

  recalcularBase() {
    const zona = ZONAS[this.categoria];
    if (!zona) { this.bx = W * 0.5; this.by = H * 0.5; return; }
    // Dispersión amplia: las pintitas forman un área de color, no un bollo
    const dispersion = Math.min(W, H) * 0.21;
    const r = this.semillaRad * dispersion;
    this.bx = zona.x + Math.cos(this.semillaAng) * r;
    this.by = zona.y + Math.sin(this.semillaAng) * r;
  }

  actualizar(dt, hoverX, hoverY, mouseVel, centroides) {
    this.edad += dt;
    this.fase += this.velFase * dt;

    // Sin reacción al hover estático. Solo se disgregan al agitar.
    // Umbral más bajo para que el movimiento del mouse se perciba claramente
    const UMBRAL_AGITACION = 180;
    if (hoverX !== null && mouseVel > UMBRAL_AGITACION) {
      const dx = (this.bx + this.ox) - hoverX;
      const dy = (this.by + this.oy) - hoverY;
      const distSq = dx * dx + dy * dy;
      const radioInfluencia = 190;
      if (distSq < radioInfluencia * radioInfluencia && distSq > 1) {
        const dist = Math.sqrt(distSq);
        const factorDist = (radioInfluencia - dist) / radioInfluencia;
        // Fuerza proporcional a velocidad, con rango mayor
        const velExceso = Math.min(2.8, (mouseVel - UMBRAL_AGITACION) / 350);
        const fuerza = factorDist * velExceso * 0.7;
        this.ovx += (dx / dist) * fuerza;
        this.ovy += (dy / dist) * fuerza;
      }
    }

    // Atracción débil al centroide del mismo color (cohesión sin colapso)
    if (centroides) {
      const c = centroides[this.categoria];
      if (c && c.count > 1) {
        const dx = c.x - this.x;
        const dy = c.y - this.y;
        // Fuerza moderada: cohesión pero no colapso ni bollo compacto
        const fuerza = 0.00035;
        this.ovx += dx * fuerza;
        this.ovy += dy * fuerza;
      }
    }

    // Resorte hacia posición base (zona)
    const k = 0.0085;
    this.ovx -= this.ox * k;
    this.ovy -= this.oy * k;

    // Damping
    this.ovx *= 0.93;
    this.ovy *= 0.93;

    // Integrar offset
    this.ox += this.ovx;
    this.oy += this.ovy;

    // Movimientos internos muy sutiles para sugerir la composición de la masa
    this.ox += (Math.random() - 0.5) * 0.10;
    this.oy += (Math.random() - 0.5) * 0.10;

    // Interpolación suave de la opacidad de filtro
    this.opacidadFiltro += (this.opacidadFiltroObjetivo - this.opacidadFiltro) * 0.05;

    this.x = this.bx + this.ox;
    this.y = this.by + this.oy;
  }

  dibujar(ctx, respiracionGlobal) {
    // Si está filtrada hacia 0, no dibujar
    if (this.opacidadFiltro < 0.005) return;

    // Respiración con personalidad propia más visible + global más sutil
    // Esto da sensación de organismo vivo con partes que respiran a distintos ritmos
    const respiraPropio = Math.sin(this.fase) * 4.5;
    const respiraGlobal = respiracionGlobal * 7;
    const radio = Math.max(2, this.radioBase + respiraPropio + respiraGlobal);

    // Pulso colectivo de opacidad más sutil
    const pulsoOpacidad = 1 + respiracionGlobal * 0.12;

    // Fade-in lento al aparecer
    const opacidadFade = Math.min(1, this.edad / 6000);
    const opacidad = this.opacidadBase * opacidadFade * pulsoOpacidad * this.opacidadFiltro;

    // Gradiente con caída exponencial suave (sin anillos visibles)
    const r = this.rgb.r, g = this.rgb.g, b = this.rgb.b;
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, radio);
    grad.addColorStop(0,    `rgba(${r}, ${g}, ${b}, ${opacidad})`);
    grad.addColorStop(0.12, `rgba(${r}, ${g}, ${b}, ${opacidad * 0.94})`);
    grad.addColorStop(0.25, `rgba(${r}, ${g}, ${b}, ${opacidad * 0.78})`);
    grad.addColorStop(0.4,  `rgba(${r}, ${g}, ${b}, ${opacidad * 0.55})`);
    grad.addColorStop(0.55, `rgba(${r}, ${g}, ${b}, ${opacidad * 0.32})`);
    grad.addColorStop(0.7,  `rgba(${r}, ${g}, ${b}, ${opacidad * 0.15})`);
    grad.addColorStop(0.85, `rgba(${r}, ${g}, ${b}, ${opacidad * 0.05})`);
    grad.addColorStop(1,    `rgba(${r}, ${g}, ${b}, 0)`);

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, radio, 0, Math.PI * 2);
    ctx.fill();
  }

  // Detección de click sobre la mancha
  contiene(x, y) {
    const dx = x - this.x;
    const dy = y - this.y;
    const radioClick = this.radioBase * 0.55;
    return (dx * dx + dy * dy) < (radioClick * radioClick);
  }
}

// ============================================================
// ESTADO GLOBAL
// ============================================================
const pintitas = [];
const pintitasMap = new Map();
ajustarCanvas();
window.addEventListener('resize', ajustarCanvas);

let ultimoTiempo = performance.now();
let hoverX = null, hoverY = null;
let tiempoGlobal = 0;

// Velocidad del mouse (para intensidad de separación)
let mouseVel = 0;
let mousePrevX = null, mousePrevY = null;
let ultimoMouseTime = performance.now();

// ============================================================
// MOVIMIENTO ORGÁNICO DE LAS ZONAS Y AGRUPACIÓN POR COLOR
// ============================================================
// Las zonas oscilan lentamente como células vivas
// Cuando hay filtros activos, las zonas restantes se redistribuyen en el círculo
function actualizarZonas(tiempoGlobal) {
  const cx = W * 0.5, cy = H * 0.5;
  const radioBase = Math.min(W, H) * 0.26;
  const cats = Object.keys(CATEGORIAS);

  // Categorías visibles para redistribuir el espacio
  const activas = cats.filter(c => filtrosActivos[c]);
  const nActivas = activas.length || 1;
  const indicesActivos = {};
  activas.forEach((cat, i) => { indicesActivos[cat] = i; });

  cats.forEach((cat, i) => {
    // Si la categoría está activa, usa su posición en el círculo redistribuido
    // Si no, mantiene su posición original (no afecta porque está invisible)
    let posicionRadial;
    if (filtrosActivos[cat]) {
      posicionRadial = indicesActivos[cat] / nActivas;
    } else {
      posicionRadial = i / cats.length;
    }
    const anguloBase = posicionRadial * Math.PI * 2 - Math.PI / 2;
    // Oscilación lenta del organismo (cada zona con su propio ritmo)
    const oscilAng = Math.sin(tiempoGlobal * 0.00007 + i * 1.3) * 0.16;
    const oscilRad = Math.sin(tiempoGlobal * 0.00005 + i * 0.7) * 30;
    const angulo = anguloBase + oscilAng;
    const radioActual = radioBase + oscilRad;
    ZONAS[cat] = {
      x: cx + Math.cos(angulo) * radioActual,
      y: cy + Math.sin(angulo) * radioActual
    };
  });
}

// Calcula centroide de cada categoría (para atracción interna del grupo)
function calcularCentroides(pintitas) {
  const centroides = {};
  for (const cat of Object.keys(CATEGORIAS)) {
    centroides[cat] = { sx: 0, sy: 0, count: 0, x: 0, y: 0 };
  }
  for (const p of pintitas) {
    const c = centroides[p.categoria];
    if (c) {
      c.sx += p.x;
      c.sy += p.y;
      c.count++;
    }
  }
  for (const cat of Object.keys(centroides)) {
    const c = centroides[cat];
    if (c.count > 0) {
      c.x = c.sx / c.count;
      c.y = c.sy / c.count;
    }
  }
  return centroides;
}

// ============================================================
// LOOP DE RENDER
// ============================================================
function render() {
  const ahora = performance.now();
  const dt = Math.min(50, ahora - ultimoTiempo);
  ultimoTiempo = ahora;
  tiempoGlobal += dt;

  // Decay de la velocidad del mouse cuando no se mueve
  mouseVel *= Math.pow(0.92, dt / 16);

  // Respiración global del organismo (~14 segundos, intensificada)
  const respiracionGlobal = Math.sin(tiempoGlobal * 0.00022);

  // Las zonas derivan lentamente como células
  actualizarZonas(tiempoGlobal);

  // Centroides de color para la cohesión grupal
  const centroides = calcularCentroides(pintitas);

  // Trail con persistencia ligera (estela orgánica)
  ctx.fillStyle = 'rgba(5, 5, 5, 0.09)';
  ctx.fillRect(0, 0, W, H);

  // Modo screen: mezcla de luz con ceiling natural
  ctx.globalCompositeOperation = 'screen';

  for (const p of pintitas) {
    p.recalcularBase(); // las zonas se movieron, las bases también
    p.actualizar(dt, hoverX, hoverY, mouseVel, centroides);
    p.dibujar(ctx, respiracionGlobal);
  }

  ctx.globalCompositeOperation = 'source-over';

  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// ============================================================
// INTERACCIÓN
// ============================================================
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const newX = e.clientX - rect.left;
  const newY = e.clientY - rect.top;

  // Calcular velocidad del mouse
  if (mousePrevX !== null) {
    const ahora = performance.now();
    const dt = Math.max(1, ahora - ultimoMouseTime);
    const dx = newX - mousePrevX;
    const dy = newY - mousePrevY;
    const v = Math.sqrt(dx * dx + dy * dy) / dt * 1000;
    mouseVel = mouseVel * 0.6 + v * 0.4; // smoothing
    ultimoMouseTime = ahora;
  }
  mousePrevX = newX;
  mousePrevY = newY;
  hoverX = newX;
  hoverY = newY;
});
canvas.addEventListener('mouseleave', () => { hoverX = null; hoverY = null; mouseVel = 0; });

canvas.addEventListener('click', async (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  let target = null;
  let mejorDist = Infinity;
  for (const p of pintitas) {
    const dx = x - p.x;
    const dy = y - p.y;
    const d = dx * dx + dy * dy;
    const radioClick = p.radioBase * 0.6;
    if (d < radioClick * radioClick && d < mejorDist) {
      mejorDist = d;
      target = p;
    }
  }
  if (target) await abrirRelato(target.respuestaId);
});

// Touch para móvil
let touchMoviendose = false;
canvas.addEventListener('touchstart', (e) => {
  touchMoviendose = false;
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  hoverX = t.clientX - rect.left;
  hoverY = t.clientY - rect.top;
});
canvas.addEventListener('touchmove', (e) => {
  touchMoviendose = true;
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  const newX = t.clientX - rect.left;
  const newY = t.clientY - rect.top;

  // Velocidad del touch
  if (mousePrevX !== null) {
    const ahora = performance.now();
    const dt = Math.max(1, ahora - ultimoMouseTime);
    const dx = newX - mousePrevX;
    const dy = newY - mousePrevY;
    const v = Math.sqrt(dx * dx + dy * dy) / dt * 1000;
    mouseVel = mouseVel * 0.6 + v * 0.4;
    ultimoMouseTime = ahora;
  }
  mousePrevX = newX;
  mousePrevY = newY;
  hoverX = newX;
  hoverY = newY;
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', async () => {
  if (!touchMoviendose && hoverX !== null) {
    let target = null;
    let mejorDist = Infinity;
    for (const p of pintitas) {
      const dx = hoverX - p.x;
      const dy = hoverY - p.y;
      const d = dx * dx + dy * dy;
      const radioClick = p.radioBase * 0.6;
      if (d < radioClick * radioClick && d < mejorDist) {
        mejorDist = d;
        target = p;
      }
    }
    if (target) await abrirRelato(target.respuestaId);
  }
  setTimeout(() => { hoverX = null; hoverY = null; }, 600);
});

// ============================================================
// MODAL CON RELATO
// ============================================================
async function abrirRelato(respuestaId) {
  try {
    const res = await fetch(`${API_BASE}/relato/${respuestaId}`);
    const data = await res.json();
    if (data.status === 'error') return;
    document.getElementById('modal-texto').textContent = data.relato || '(sin contenido)';
    const cats = data.categorias_activadas || {};
    const chips = Object.keys(cats).map(cat => {
      const info = CATEGORIAS[cat] || { color: '#888', nombre: cat };
      return `<span class="modal-cat-chip" style="background:${info.color}">${info.nombre}</span>`;
    }).join('');
    document.getElementById('modal-cats').innerHTML = chips;
    document.getElementById('modal').classList.add('activo');
  } catch(e) {
    console.error('Error abriendo relato:', e);
  }
}
function cerrarModal() { document.getElementById('modal').classList.remove('activo'); }
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') cerrarModal();
});
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') cerrarModal(); });

// ============================================================
// LEYENDA INTERACTIVA - filtrado por categoría
// ============================================================
function clickCategoria(cat, soloEsta) {
  if (soloEsta) {
    // Shift+click: mostrar SOLO esta categoría
    // Si ya es la única visible, restaurar todas
    const yaEsSolo = filtrosActivos[cat] &&
      Object.entries(filtrosActivos).every(([k, v]) => k === cat ? v : !v);
    if (yaEsSolo) {
      for (const k of Object.keys(filtrosActivos)) filtrosActivos[k] = true;
    } else {
      for (const k of Object.keys(filtrosActivos)) filtrosActivos[k] = (k === cat);
    }
  } else {
    // Click normal: toggle
    filtrosActivos[cat] = !filtrosActivos[cat];
  }
  // Actualizar objetivo de cada pintita
  for (const p of pintitas) {
    p.opacidadFiltroObjetivo = filtrosActivos[p.categoria] ? 1 : 0;
  }
  actualizarLeyenda();
}

function actualizarLeyenda() {
  const cont = document.getElementById('leyenda');
  cont.innerHTML = Object.entries(CATEGORIAS).map(([k, v]) => {
    const apagado = !filtrosActivos[k] ? ' apagado' : '';
    return `<div class="leyenda-item${apagado}" data-cat="${k}" role="button" tabindex="0" aria-pressed="${filtrosActivos[k]}" title="Click: ocultar/mostrar · Shift+click: aislar esta">
      <span class="leyenda-dot" style="background:${v.color}"></span>${v.nombre}
    </div>`;
  }).join('');

  cont.querySelectorAll('.leyenda-item').forEach(el => {
    el.addEventListener('click', (e) => {
      clickCategoria(el.dataset.cat, e.shiftKey);
    });
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        clickCategoria(el.dataset.cat, e.shiftKey);
      }
    });
  });
}
actualizarLeyenda();

// ============================================================
// CONEXIÓN AL SERVIDOR
// ============================================================
let ultimaPintitaId = 0;

async function inicializar() {
  try {
    const res = await fetch(`${API_BASE}/pintitas_recientes?n=2000`);
    const data = await res.json();

    // Orden cronológico
    data.reverse();
    for (const p of data) {
      if (!pintitasMap.has(p.id)) {
        const pintita = new Pintita(p.id, p.respuesta_id, p.categoria);
        pintitas.push(pintita);
        pintitasMap.set(p.id, pintita);
        if (p.id > ultimaPintitaId) ultimaPintitaId = p.id;
      }
    }
    actualizarEstado();
  } catch(e) {
    console.error('Error inicializando:', e);
    marcarSinConexion();
  }
}

async function consultarNuevas() {
  try {
    const res = await fetch(`${API_BASE}/pintitas_recientes?n=100`);
    const data = await res.json();

    const nuevas = data.filter(p => p.id > ultimaPintitaId);
    nuevas.reverse();
    for (const p of nuevas) {
      if (!pintitasMap.has(p.id)) {
        setTimeout(() => {
          // esNueva = true → aparece fuera del canvas y es atraída a su zona
          const pintita = new Pintita(p.id, p.respuesta_id, p.categoria, true);
          pintitas.push(pintita);
          pintitasMap.set(p.id, pintita);
        }, Math.random() * 1500);
        if (p.id > ultimaPintitaId) ultimaPintitaId = p.id;
      }
    }
    actualizarEstado();
  } catch(e) {
    marcarSinConexion();
  }
}

async function actualizarEstado() {
  try {
    const res = await fetch(`${API_BASE}/estado`);
    const data = await res.json();
    document.getElementById('n-respuestas').textContent = data.total_respuestas;
    document.getElementById('estado-dot').classList.add('vivo');
    document.getElementById('estado-texto').textContent = 'corpus activo';
  } catch(e) {
    marcarSinConexion();
  }
}

function marcarSinConexion() {
  document.getElementById('estado-dot').classList.remove('vivo');
  document.getElementById('estado-texto').textContent = 'sin conexión';
}

inicializar();
setInterval(consultarNuevas, POLL_INTERVAL);

// ============================================================
// SHAKE DEL TELÉFONO: agitar para expandir la nebulosa
// ============================================================
let ultimoShakeTime = 0;
let motionActivo = false;

function activarMovimiento() {
  if (motionActivo) return;
  motionActivo = true;
  window.addEventListener('devicemotion', (e) => {
    const acc = e.accelerationIncludingGravity || e.acceleration;
    if (!acc) return;
    const ax = acc.x || 0;
    const ay = acc.y || 0;
    const az = acc.z || 0;
    const magnitud = Math.sqrt(ax * ax + ay * ay + az * az);

    if (magnitud > 18) {
      const ahora = performance.now();
      if (ahora - ultimoShakeTime > 200) {
        ultimoShakeTime = ahora;
        const cx = W * 0.5, cy = H * 0.5;
        const intensidad = Math.min(8, (magnitud - 18) * 0.6);
        for (const p of pintitas) {
          const dx = p.x - cx;
          const dy = p.y - cy;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;
          p.ovx += (dx / dist) * intensidad;
          p.ovy += (dy / dist) * intensidad;
        }
      }
    }
  });
  // Esconder el botón una vez activado
  const btn = document.getElementById('btn-motion');
  if (btn) btn.style.display = 'none';
}

// Detectar si es dispositivo táctil y necesita permiso (iOS 13+)
const esTouch = 'ontouchstart' in window;
const necesitaPermiso = (typeof DeviceMotionEvent !== 'undefined' &&
                         typeof DeviceMotionEvent.requestPermission === 'function');

if (esTouch) {
  if (necesitaPermiso) {
    // Crear botón flotante para solicitar permiso (iOS)
    const btn = document.createElement('button');
    btn.id = 'btn-motion';
    btn.textContent = 'tocar para activar movimiento';
    btn.style.cssText = `
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(20, 20, 20, 0.85); color: #ccc; border: 0.5px solid #444;
      padding: 1rem 1.5rem; font-family: 'Space Mono', monospace; font-size: 11px;
      letter-spacing: 0.15em; cursor: pointer; z-index: 200; backdrop-filter: blur(8px);
    `;
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      try {
        const respuesta = await DeviceMotionEvent.requestPermission();
        if (respuesta === 'granted') {
          activarMovimiento();
        } else {
          btn.textContent = 'permiso denegado';
          setTimeout(() => btn.style.display = 'none', 2000);
        }
      } catch(err) {
        btn.style.display = 'none';
      }
    });
    document.body.appendChild(btn);
  } else if (typeof DeviceMotionEvent !== 'undefined') {
    // Android y otros: activar directamente sin pedir permiso
    activarMovimiento();
  }
}
