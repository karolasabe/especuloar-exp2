<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espéculo(ar) — nebulosa que respira</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital@0;1&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050505; }
  body { font-family: 'Space Mono', monospace; color: #888; }

  #canvas-container { position: fixed; inset: 0; z-index: 1; }
  canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }

  #overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 2;
    padding: 2rem;
    display: flex; flex-direction: column; justify-content: space-between;
    mix-blend-mode: screen;
  }
  .header-bar { display: flex; justify-content: space-between; align-items: flex-start; }
  .titulo { font-size: 11px; letter-spacing: 0.2em; color: #666; }
  .subtitulo { font-size: 10px; letter-spacing: 0.1em; color: #444; margin-top: 6px; font-style: italic; }
  .contador { text-align: right; }
  .n-respuestas { font-size: 42px; font-weight: 300; color: #aaa; line-height: 1; }
  .n-label { font-size: 9px; color: #444; letter-spacing: 0.2em; margin-top: 4px; }

  .footer-bar { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1rem; }
  .leyenda { display: flex; flex-wrap: wrap; gap: 12px; max-width: 70%; }
  .leyenda-item { display: flex; align-items: center; gap: 6px; font-size: 9px; color: #555; letter-spacing: 0.05em; }
  .leyenda-dot { width: 8px; height: 8px; border-radius: 50%; }

  .estado { text-align: right; }
  .estado-dot { width: 5px; height: 5px; border-radius: 50%; background: #1a1a1a; display: inline-block; margin-right: 6px; vertical-align: middle; }
  .estado-dot.vivo { background: #1D9E75; box-shadow: 0 0 8px rgba(29, 158, 117, 0.4); }
  .estado-texto { font-size: 9px; color: #444; letter-spacing: 0.15em; }

  .pista {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    padding: 1rem 1.5rem; font-size: 9px; color: #444; letter-spacing: 0.2em;
    pointer-events: none; z-index: 3;
    opacity: 0.6;
  }

  /* Modal con el relato */
  #modal {
    position: fixed; inset: 0; z-index: 100;
    display: none; align-items: center; justify-content: center;
    background: rgba(5, 5, 5, 0.88); padding: 2rem;
    backdrop-filter: blur(8px);
  }
  #modal.activo { display: flex; }
  .modal-contenido {
    background: #0d0d0d; border: 0.5px solid #222;
    max-width: 640px; width: 100%; padding: 2.5rem;
    max-height: 80vh; overflow-y: auto;
    color: #ccc; font-family: 'Space Mono', monospace; font-size: 14px; line-height: 1.7;
    position: relative;
  }
  .modal-categorias { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
  .modal-cat-chip { font-size: 10px; padding: 4px 10px; border-radius: 12px; letter-spacing: 0.05em; color: #fff; }
  .modal-relato { white-space: pre-wrap; color: #ddd; }
  .modal-cerrar {
    position: absolute; top: 1rem; right: 1.5rem;
    background: transparent; border: none; color: #666;
    font-size: 11px; cursor: pointer; font-family: inherit;
    letter-spacing: 0.1em;
  }
  .modal-cerrar:hover { color: #ddd; }

  @media (max-width: 640px) {
    #overlay { padding: 1.25rem; }
    .n-respuestas { font-size: 32px; }
    .leyenda { max-width: 100%; gap: 8px; }
    .leyenda-item { font-size: 8px; }
    .modal-contenido { padding: 1.5rem; font-size: 13px; }
    .pista { font-size: 8px; padding: 0.75rem; }
  }
</style>
</head>
<body>

<div id="canvas-container">
  <canvas id="lienzo" aria-label="Nebulosa colectiva de Espéculo(ar)"></canvas>
</div>

<div id="overlay">
  <div class="header-bar">
    <div>
      <div class="titulo">ESPÉCULO(AR)</div>
      <div class="subtitulo">nebulosa colectiva · tecnologías de género</div>
    </div>
    <div class="contador">
      <div class="n-respuestas" id="n-respuestas">—</div>
      <div class="n-label">VOCES</div>
    </div>
  </div>

  <div class="footer-bar">
    <div class="leyenda" id="leyenda"></div>
    <div class="estado">
      <span class="estado-dot" id="estado-dot"></span>
      <span class="estado-texto" id="estado-texto">conectando</span>
    </div>
  </div>
</div>

<div class="pista">pasa el cursor para desarmar la nube · haz click sobre una pintita para leer su relato</div>

<div id="modal" role="dialog" aria-modal="true">
  <div class="modal-contenido">
    <button class="modal-cerrar" onclick="cerrarModal()" aria-label="Cerrar">✕ cerrar</button>
    <div class="modal-categorias" id="modal-cats"></div>
    <div class="modal-relato" id="modal-texto"></div>
  </div>
</div>

<script>
// ============================================================
// CONFIGURACIÓN
// ============================================================
const API_BASE = 'https://especuloar-exp2.onrender.com';
const POLL_INTERVAL = 5000;

const CATEGORIAS = {
  'dolor_fisico':              { color: '#E8453A', nombre: 'dolor físico' },
  'frio_metal':                { color: '#5A8FD4', nombre: 'frío · metal' },
  'materiales_agradables':     { color: '#E8935A', nombre: 'materiales cálidos' },
  'miedo_ansiedad':            { color: '#9E9E9E', nombre: 'miedo · ansiedad' },
  'sensaciones_agradables':    { color: '#D4847A', nombre: 'seguridad · calma' },
  'normalizacion':             { color: '#6BBF8A', nombre: 'normalización' },
  'vivencia_sexual_traumatica':{ color: '#9B6BBF', nombre: 'vivencia traumática' },
  'profesional_masculino':     { color: '#1A3A6B', nombre: 'profesional masculino' },
  'profesional_femenino':      { color: '#D4B800', nombre: 'profesional femenina' }
};

// Cada categoría tiene una zona base donde se forma su mancha
// Se calculan dinámicamente al iniciar y al redimensionar
let ZONAS = {};
function calcularZonas() {
  // Distribución radial: las categorías se colocan en círculo
  // dejando espacio en el centro para mezclas
  const cx = W * 0.5, cy = H * 0.5;
  const radio = Math.min(W, H) * 0.28;
  const cats = Object.keys(CATEGORIAS);
  ZONAS = {};
  cats.forEach((cat, i) => {
    const angulo = (i / cats.length) * Math.PI * 2 - Math.PI / 2;
    ZONAS[cat] = {
      x: cx + Math.cos(angulo) * radio,
      y: cy + Math.sin(angulo) * radio
    };
  });
}

// ============================================================
// CANVAS
// ============================================================
const canvas = document.getElementById('lienzo');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;

function ajustarCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
  calcularZonas();
  // Reasignar posiciones base de las pintitas existentes
  for (const p of pintitas) p.recalcularBase();
}
ajustarCanvas();
window.addEventListener('resize', ajustarCanvas);

// ============================================================
// PINTITA — partícula con posición base + offset por repulsión
// ============================================================
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return { r, g, b };
}

class Pintita {
  constructor(id, respuestaId, categoria, intensidad) {
    this.id = id;
    this.respuestaId = respuestaId;
    this.categoria = categoria;
    this.intensidad = intensidad;
    this.color = CATEGORIAS[categoria]?.color || '#888';
    this.rgb = hexToRgb(this.color);

    // Semilla angular y radial para posición orgánica dentro de su zona
    this.semillaAng = Math.random() * Math.PI * 2;
    this.semillaRad = Math.pow(Math.random(), 0.7); // sesgo hacia el centro de la zona

    // Posición base (recalculable según zona)
    this.bx = 0; this.by = 0;
    this.recalcularBase();

    // Posición actual (con offset por repulsión)
    this.x = this.bx;
    this.y = this.by;

    // Offset físico (cuánto se ha alejado de su base)
    this.ox = 0; this.oy = 0;
    // Velocidad del offset
    this.ovx = 0; this.ovy = 0;

    // Tamaño base de la mancha: depende de intensidad
    // Mancha grande y difusa (estética display 1)
    this.radioBase = 45 + intensidad * 55;

    // Fase de respiración propia
    this.fase = Math.random() * Math.PI * 2;
    this.velFase = 0.0006 + Math.random() * 0.0004;

    // Vida (fade-in al aparecer)
    this.edad = 0;
  }

  recalcularBase() {
    const zona = ZONAS[this.categoria];
    if (!zona) { this.bx = W * 0.5; this.by = H * 0.5; return; }
    // Distribución gaussiana aproximada alrededor de la zona
    const dispersion = Math.min(W, H) * 0.18;
    const r = this.semillaRad * dispersion;
    this.bx = zona.x + Math.cos(this.semillaAng) * r;
    this.by = zona.y + Math.sin(this.semillaAng) * r;
  }

  actualizar(dt, hoverX, hoverY, respiracionGlobal) {
    this.edad += dt;
    this.fase += this.velFase * dt;

    // Repulsión del cursor: fuerte cuando está cerca
    if (hoverX !== null) {
      const dx = (this.bx + this.ox) - hoverX;
      const dy = (this.by + this.oy) - hoverY;
      const distSq = dx * dx + dy * dy;
      const radioInfluencia = 180;
      if (distSq < radioInfluencia * radioInfluencia && distSq > 1) {
        const dist = Math.sqrt(distSq);
        // Fuerza decrece con distancia, mayor cerca
        const fuerza = 0.6 * Math.pow((radioInfluencia - dist) / radioInfluencia, 2);
        this.ovx += (dx / dist) * fuerza;
        this.ovy += (dy / dist) * fuerza;
      }
    }

    // Fuerza de retorno a la base (resorte suave)
    const k = 0.012; // rigidez
    this.ovx -= this.ox * k;
    this.ovy -= this.oy * k;

    // Damping (resistencia)
    this.ovx *= 0.92;
    this.ovy *= 0.92;

    // Integrar offset
    this.ox += this.ovx;
    this.oy += this.ovy;

    // Ruido browniano sutil para vida orgánica
    this.ox += (Math.random() - 0.5) * 0.15;
    this.oy += (Math.random() - 0.5) * 0.15;

    // Posición final = base + offset
    this.x = this.bx + this.ox;
    this.y = this.by + this.oy;
  }

  dibujar(ctx, respiracionGlobal) {
    // Respiración: combina la propia con la global
    const respiraPropio = Math.sin(this.fase) * 5;
    const respiraGlobal = respiracionGlobal * 8;
    const radio = Math.max(2, this.radioBase + respiraPropio + respiraGlobal);

    // Fade-in
    const opacidadFade = Math.min(1, this.edad / 2500);
    // Saturación según intensidad
    const opacidadBase = 0.25 + this.intensidad * 0.45;
    const opacidad = opacidadBase * opacidadFade;

    // Gradiente radial amplio y muy difuso (estética display 1)
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, radio);
    grad.addColorStop(0,    `rgba(${this.rgb.r}, ${this.rgb.g}, ${this.rgb.b}, ${opacidad})`);
    grad.addColorStop(0.35, `rgba(${this.rgb.r}, ${this.rgb.g}, ${this.rgb.b}, ${opacidad * 0.55})`);
    grad.addColorStop(0.7,  `rgba(${this.rgb.r}, ${this.rgb.g}, ${this.rgb.b}, ${opacidad * 0.18})`);
    grad.addColorStop(1,    `rgba(${this.rgb.r}, ${this.rgb.g}, ${this.rgb.b}, 0)`);

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, radio, 0, Math.PI * 2);
    ctx.fill();
  }

  // Detección para click: usa un radio efectivo más pequeño
  // (el centro de la mancha es donde mejor se identifica)
  contiene(x, y) {
    const dx = x - this.x;
    const dy = y - this.y;
    return (dx * dx + dy * dy) < (this.radioBase * 0.45) * (this.radioBase * 0.45);
  }
}

// ============================================================
// ESTADO GLOBAL
// ============================================================
const pintitas = [];
const pintitasMap = new Map();
let ultimoTiempo = performance.now();
let hoverX = null, hoverY = null;
let tiempoGlobal = 0;

// ============================================================
// LOOP DE RENDER
// ============================================================
function render() {
  const ahora = performance.now();
  const dt = Math.min(50, ahora - ultimoTiempo);
  ultimoTiempo = ahora;
  tiempoGlobal += dt;

  // Respiración global del conjunto: ciclo lento (~12 segundos por inhalar/exhalar)
  const respiracionGlobal = Math.sin(tiempoGlobal * 0.00026);

  // Fondo con persistencia leve (efecto acuoso, las manchas dejan estela)
  ctx.fillStyle = 'rgba(5, 5, 5, 0.05)';
  ctx.fillRect(0, 0, W, H);

  // Modo de mezcla suave para que los colores se sumen como pigmento de acuarela
  ctx.globalCompositeOperation = 'lighter';

  for (const p of pintitas) {
    p.actualizar(dt, hoverX, hoverY, respiracionGlobal);
    p.dibujar(ctx, respiracionGlobal);
  }

  ctx.globalCompositeOperation = 'source-over';

  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// ============================================================
// INTERACCIÓN
// ============================================================
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  hoverX = e.clientX - rect.left;
  hoverY = e.clientY - rect.top;
});

canvas.addEventListener('mouseleave', () => {
  hoverX = null; hoverY = null;
});

canvas.addEventListener('click', async (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  // Buscar pintita más cercana al click
  let target = null;
  let mejorDist = Infinity;
  for (const p of pintitas) {
    const dx = x - p.x;
    const dy = y - p.y;
    const d = dx * dx + dy * dy;
    if (d < (p.radioBase * 0.5) * (p.radioBase * 0.5) && d < mejorDist) {
      mejorDist = d;
      target = p;
    }
  }
  if (target) await abrirRelato(target.respuestaId);
});

// Touch para móvil
let touchMoviendose = false;
canvas.addEventListener('touchstart', (e) => {
  touchMoviendose = false;
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  hoverX = t.clientX - rect.left;
  hoverY = t.clientY - rect.top;
});

canvas.addEventListener('touchmove', (e) => {
  touchMoviendose = true;
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  hoverX = t.clientX - rect.left;
  hoverY = t.clientY - rect.top;
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', async (e) => {
  if (!touchMoviendose && hoverX !== null) {
    // Tap = click
    let target = null;
    let mejorDist = Infinity;
    for (const p of pintitas) {
      const dx = hoverX - p.x;
      const dy = hoverY - p.y;
      const d = dx * dx + dy * dy;
      if (d < (p.radioBase * 0.5) * (p.radioBase * 0.5) && d < mejorDist) {
        mejorDist = d;
        target = p;
      }
    }
    if (target) await abrirRelato(target.respuestaId);
  }
  // Mantener el hover un momento tras el touch para que el efecto persista visible
  setTimeout(() => { hoverX = null; hoverY = null; }, 600);
});

// ============================================================
// MODAL CON RELATO
// ============================================================
async function abrirRelato(respuestaId) {
  try {
    const res = await fetch(`${API_BASE}/relato/${respuestaId}`);
    const data = await res.json();
    if (data.status === 'error') return;
    document.getElementById('modal-texto').textContent = data.relato || '(sin contenido)';
    const cats = data.categorias_activadas || {};
    const chips = Object.keys(cats).map(cat => {
      const info = CATEGORIAS[cat] || { color: '#888', nombre: cat };
      return `<span class="modal-cat-chip" style="background:${info.color}">${info.nombre}</span>`;
    }).join('');
    document.getElementById('modal-cats').innerHTML = chips;
    document.getElementById('modal').classList.add('activo');
  } catch(e) {
    console.error('Error abriendo relato:', e);
  }
}
function cerrarModal() { document.getElementById('modal').classList.remove('activo'); }
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') cerrarModal();
});
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') cerrarModal(); });

// ============================================================
// LEYENDA
// ============================================================
function actualizarLeyenda() {
  const cont = document.getElementById('leyenda');
  cont.innerHTML = Object.entries(CATEGORIAS).map(([k, v]) =>
    `<div class="leyenda-item"><span class="leyenda-dot" style="background:${v.color}"></span>${v.nombre}</div>`
  ).join('');
}
actualizarLeyenda();

// ============================================================
// CONEXIÓN AL SERVIDOR
// ============================================================
let ultimaPintitaId = 0;

async function inicializar() {
  try {
    const res = await fetch(`${API_BASE}/pintitas_recientes?n=2000`);
    const data = await res.json();
    data.reverse();
    for (const p of data) {
      if (!pintitasMap.has(p.id)) {
        const pintita = new Pintita(p.id, p.respuesta_id, p.categoria, p.intensidad);
        pintitas.push(pintita);
        pintitasMap.set(p.id, pintita);
        if (p.id > ultimaPintitaId) ultimaPintitaId = p.id;
      }
    }
    actualizarEstado();
  } catch(e) {
    console.error('Error inicializando:', e);
    marcarSinConexion();
  }
}

async function consultarNuevas() {
  try {
    const res = await fetch(`${API_BASE}/pintitas_recientes?n=100`);
    const data = await res.json();
    const nuevas = data.filter(p => p.id > ultimaPintitaId);
    nuevas.reverse();
    for (const p of nuevas) {
      if (!pintitasMap.has(p.id)) {
        setTimeout(() => {
          const pintita = new Pintita(p.id, p.respuesta_id, p.categoria, p.intensidad);
          pintitas.push(pintita);
          pintitasMap.set(p.id, pintita);
        }, Math.random() * 1500);
        if (p.id > ultimaPintitaId) ultimaPintitaId = p.id;
      }
    }
    actualizarEstado();
  } catch(e) {
    marcarSinConexion();
  }
}

async function actualizarEstado() {
  try {
    const res = await fetch(`${API_BASE}/estado`);
    const data = await res.json();
    document.getElementById('n-respuestas').textContent = data.total_respuestas;
    document.getElementById('estado-dot').classList.add('vivo');
    document.getElementById('estado-texto').textContent = 'corpus activo';
  } catch(e) {
    marcarSinConexion();
  }
}

function marcarSinConexion() {
  document.getElementById('estado-dot').classList.remove('vivo');
  document.getElementById('estado-texto').textContent = 'sin conexión';
}

inicializar();
setInterval(consultarNuevas, POLL_INTERVAL);
</script>
</body>
</html>
