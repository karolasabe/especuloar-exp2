<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Espéculo(ar) — galaxia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital@0;1&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #030303; }
  body { font-family: 'Space Mono', monospace; }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }

  #overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 2;
    padding: 1.8rem;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .header-bar { display: flex; justify-content: space-between; align-items: flex-start; }
  .titulo { font-size: 11px; letter-spacing: 0.2em; color: #555; }
  .subtitulo { font-size: 10px; letter-spacing: 0.1em; color: #333; margin-top: 5px; font-style: italic; }
  .contador { text-align: right; }
  .n-respuestas { font-size: 38px; font-weight: 300; color: #888; line-height: 1; }
  .n-label { font-size: 9px; color: #444; letter-spacing: 0.2em; margin-top: 3px; }

  .footer-bar { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 0.8rem; }
  .leyenda {
    display: flex; flex-wrap: wrap; gap: 8px 14px; max-width: 78%;
    pointer-events: auto;
  }
  .leyenda-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 9px; color: #777; letter-spacing: 0.04em;
    cursor: pointer; user-select: none; padding: 3px 2px;
    transition: opacity 0.25s, color 0.25s;
  }
  .leyenda-item:hover { color: #bbb; }
  .leyenda-item.apagado { opacity: 0.28; }
  .leyenda-dot { width: 8px; height: 8px; border-radius: 50%; transition: opacity 0.25s; flex-shrink: 0; }

  .estado { text-align: right; }
  .estado-dot { width: 5px; height: 5px; border-radius: 50%; background: #1a1a1a; display: inline-block; margin-right: 5px; vertical-align: middle; }
  .estado-dot.vivo { background: #1D9E75; box-shadow: 0 0 6px rgba(29,158,117,0.5); }
  .estado-texto { font-size: 9px; color: #444; letter-spacing: 0.12em; }

  .zoom-hint {
    position: fixed; bottom: 1.2rem; left: 50%;
    transform: translateX(-50%);
    font-size: 9px; color: #333; letter-spacing: 0.15em;
    pointer-events: none; z-index: 3;
  }

  #modal {
    position: fixed; inset: 0; z-index: 100;
    display: none; align-items: center; justify-content: center;
    background: rgba(3,3,3,0.9); padding: 2rem;
    backdrop-filter: blur(10px);
  }
  #modal.activo { display: flex; }
  .modal-contenido {
    background: #0a0a0a; border: 0.5px solid #1e1e1e;
    max-width: 600px; width: 100%; padding: 2.5rem;
    max-height: 80vh; overflow-y: auto;
    color: #ccc; font-family: 'Space Mono', monospace;
    font-size: 13.5px; line-height: 1.75; position: relative;
  }
  .modal-categorias { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.4rem; }
  .modal-cat-chip { font-size: 9.5px; padding: 3px 9px; border-radius: 10px; color: #fff; letter-spacing: 0.04em; }
  .modal-relato { white-space: pre-wrap; color: #d8d8d8; }
  .modal-cerrar {
    position: absolute; top: 1rem; right: 1.4rem;
    background: transparent; border: none; color: #555;
    font-size: 11px; cursor: pointer; font-family: inherit; letter-spacing: 0.1em;
  }
  .modal-cerrar:hover { color: #ccc; }

  @media (max-width: 640px) {
    #overlay { padding: 1.1rem; }
    .n-respuestas { font-size: 28px; }
    .leyenda-item { font-size: 8px; }
    .modal-contenido { padding: 1.4rem; font-size: 12.5px; }
  }
</style>
</head>
<body>
<canvas id="lienzo" aria-label="Galaxia colectiva de Espéculo(ar)"></canvas>

<div id="overlay">
  <div class="header-bar">
    <div>
      <div class="titulo">ESPÉCULO(AR)</div>
      <div class="subtitulo">galaxia colectiva · tecnologías de género</div>
    </div>
    <div class="contador">
      <div class="n-respuestas" id="n-respuestas">—</div>
      <div class="n-label">VOCES</div>
    </div>
  </div>
  <div class="footer-bar">
    <div class="leyenda" id="leyenda"></div>
    <div class="estado">
      <span class="estado-dot" id="estado-dot"></span>
      <span class="estado-texto" id="estado-texto">conectando</span>
    </div>
  </div>
</div>

<div class="zoom-hint">agita el cursor para revelar relatos · pellizca / rueda para zoom · arrastra para mover</div>

<div id="modal" role="dialog" aria-modal="true">
  <div class="modal-contenido">
    <button class="modal-cerrar" onclick="cerrarModal()">cerrar</button>
    <div class="modal-categorias" id="modal-cats"></div>
    <div class="modal-relato" id="modal-texto"></div>
  </div>
</div>

<script>
// ============================================================
// CONFIGURACIÓN
// ============================================================
const API_BASE = 'https://especuloar-exp2.onrender.com';
const POLL_INTERVAL = 5000;

const CATEGORIAS = {
  'dolor_fisico':              { color: '#FF2424', nombre: 'Dolor físico' },
  'frio_metal':                { color: '#2EC4D8', nombre: 'Materiales desagradables/fríos' },
  'materiales_agradables':     { color: '#E8935A', nombre: 'Materiales agradables / cálidos' },
  'miedo_ansiedad':            { color: '#A01F35', nombre: 'Miedo / ansiedad / preocupación' },
  'sensaciones_agradables':    { color: '#D4847A', nombre: 'Sensaciones agradables / seguridad / calma' },
  'normalizacion':             { color: '#6BBF8A', nombre: 'Normalización / resignación' },
  'vivencia_sexual_traumatica':{ color: '#B814E8', nombre: 'Violencia sexual' },
  'profesional_masculino':     { color: '#9E9E9E', nombre: 'Profesional de salud masculino presente' },
  'profesional_femenino':      { color: '#D4B800', nombre: 'Profesional mujer' }
};

const filtrosActivos = {};
for (const cat of Object.keys(CATEGORIAS)) filtrosActivos[cat] = true;

// ============================================================
// CANVAS Y DIMENSIONES
// ============================================================
const canvas = document.getElementById('lienzo');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;

// Canvas offscreen para componer las gotas antes de aplicarles el filtro de fusión
const fluidoCanvas = document.createElement('canvas');
const fluidoCtx = fluidoCanvas.getContext('2d');

// Canvas offscreen para enmascarar el grano a las zonas de color
const granoMaskCanvas = document.createElement('canvas');
const granoMaskCtx = granoMaskCanvas.getContext('2d');

function ajustarCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);

  fluidoCanvas.width = W * dpr;
  fluidoCanvas.height = H * dpr;
  fluidoCtx.setTransform(1, 0, 0, 1, 0, 0);
  fluidoCtx.scale(dpr, dpr);

  granoMaskCanvas.width = W * dpr;
  granoMaskCanvas.height = H * dpr;
  granoMaskCtx.setTransform(1, 0, 0, 1, 0, 0);
  granoMaskCtx.scale(dpr, dpr);
}
ajustarCanvas();
window.addEventListener('resize', ajustarCanvas);

// ============================================================
// TEXTURA DE GRANO — añade carácter pictórico al fluido
// Una capa de ruido monocromo que se aplica sobre el color con blend soft-light
// El resultado: las zonas de color se ven texturadas, no lisas digitales
// ============================================================
function generarGrano() {
  const tam = 220;
  const c = document.createElement('canvas');
  c.width = tam;
  c.height = tam;
  const cx = c.getContext('2d');
  const img = cx.createImageData(tam, tam);
  for (let i = 0; i < img.data.length; i += 4) {
    const v = 50 + Math.random() * 205;
    img.data[i]     = v;
    img.data[i + 1] = v;
    img.data[i + 2] = v;
    img.data[i + 3] = 255;
  }
  cx.putImageData(img, 0, 0);
  return c;
}
const granoCanvas = generarGrano();
let granoPattern = null;

// ============================================================
// FACTOR DE MUNDO
// Crece con el número de relatos. Mundo circular sin paredes rectangulares
// ============================================================
let totalRelatos = 64;
function getWorldFactor() {
  return Math.sqrt(Math.max(64, totalRelatos) / 64);
}
function getWorldRadius() {
  // Radio del mundo circular. Más grande → más espacio para clusters orgánicos
  return 720 * getWorldFactor();
}

// ============================================================
// CÁMARA (zoom + pan en espacio-mundo)
// El zoom es puramente visual: nunca altera las posiciones de las pintitas
// ============================================================
const cam = {
  x: 0, y: 0,
  scale: 0.5,
  tx: 0, ty: 0,
  tscale: 0.5,
  MIN_SCALE: 0.05,
  MAX_SCALE: 4,
};

function screenToWorld(sx, sy) {
  return {
    x: (sx - W / 2) / cam.scale + cam.x,
    y: (sy - H / 2) / cam.scale + cam.y,
  };
}

function ajustarCamaraInicial() {
  // Zoom inicial cercano: vista pictórica de una sección, no del todo
  // El usuario zoomea afuera para descubrir la composición completa
  cam.tx = 0; cam.ty = 0;
  cam.tscale = 1.15;
  cam.x = cam.tx; cam.y = cam.ty; cam.scale = cam.tscale;
}

// ============================================================
// GRADIENTES PRE-RENDERIZADOS (clave para rendimiento)
// Cada categoría tiene su gradiente raised cosine cacheado como imagen
// drawImage es mucho más rápido que createRadialGradient por frame
// ============================================================
function hexToRgb(hex) {
  return {
    r: parseInt(hex.slice(1, 3), 16),
    g: parseInt(hex.slice(3, 5), 16),
    b: parseInt(hex.slice(5, 7), 16),
  };
}

// Solo necesitamos el gradiente CHISPA para la capa de revelación (nodos individuales)
// Las masas se generan por composición de círculos sólidos + filtro blur+contrast
function crearGradienteChispa(rgb) {
  const tam = 128;
  const off = document.createElement('canvas');
  off.width = tam;
  off.height = tam;
  const c = off.getContext('2d');
  const grd = c.createRadialGradient(tam/2, tam/2, 0, tam/2, tam/2, tam/2);
  grd.addColorStop(0,    `rgba(${rgb.r},${rgb.g},${rgb.b},1.000)`);
  grd.addColorStop(0.25, `rgba(${rgb.r},${rgb.g},${rgb.b},0.880)`);
  grd.addColorStop(0.45, `rgba(${rgb.r},${rgb.g},${rgb.b},0.610)`);
  grd.addColorStop(0.65, `rgba(${rgb.r},${rgb.g},${rgb.b},0.290)`);
  grd.addColorStop(0.82, `rgba(${rgb.r},${rgb.g},${rgb.b},0.075)`);
  grd.addColorStop(0.93, `rgba(${rgb.r},${rgb.g},${rgb.b},0.010)`);
  grd.addColorStop(1,    `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
  c.fillStyle = grd;
  c.fillRect(0, 0, tam, tam);
  return off;
}

const gradChispa = {};
for (const [cat, info] of Object.entries(CATEGORIAS)) {
  gradChispa[cat] = crearGradienteChispa(hexToRgb(info.color));
}

// ============================================================
// PINTITA — partícula con flocking en espacio-mundo
// Sistema visual de DOS CAPAS:
//   1) METABALL (siempre): círculo sólido pequeño que se fusiona con sus vecinos
//      del mismo color a través de un filtro blur+contrast, formando zonas amorfas
//      como gotas de aceite (lámpara de lava). Las gotas chocan y se separan,
//      siguen el flocking físico pero visualmente se ven como un fluido continuo.
//   2) CHISPA (sólo al agitar o al integrarse): nodo individual definido encima
//      de la masa. Revela que hay relatos puntuales dentro del fluido.
// ============================================================
const BLOB_RADIO_BASE = 17;       // radio de cada partícula de la pincelada (mundo)
const BLOB_ALPHA = 0.48;          // alfa moderado
const BLUR_PX = 10;               // suaviza fusión
const CONTRAST_AMOUNT = 6;        // bordes definidos sin saturar
const RADIO_CHISPA = 16;
const OPACIDAD_CHISPA = 0.28;
const DURACION_AGITACION = 2800;
const DURACION_INTEGRACION = 9000;

// Flocking
const ATRACCION_DIST = 215;
const ATRACCION_FUERZA = 0.0016;
const REPULSION_CERCANA_DIST = 28;
const REPULSION_CERCANA_FUERZA = 0.052;
const REPULSION_INTER_DIST = 105;       // zonas de color claramente separadas
const REPULSION_INTER_FUERZA = 0.0058;

class Pintita {
  constructor(id, respId, cat, esNueva = false) {
    this.id = id;
    this.respuestaId = respId;
    this.categoria = cat;

    // Tamaño variable por pintita: la mayoría medianas, algunas grandes (raras), algunas pequeñas
    const tamRand = Math.pow(Math.random(), 0.7);
    this.tamFactor = 0.55 + tamRand * 1.95;

    this.opacFactor = 0.78 + Math.random() * 0.5;

    // PINCELADA: cada pintita es un cluster de 3-5 partículas dispersas
    // Crea textura granular al fluido (no círculos sólidos lisos)
    // El brushAngle define la orientación; deriva lentamente como dirección de pincel
    this.brushAngle = Math.random() * Math.PI * 2;
    this.brushAngleVel = (Math.random() - 0.5) * 0.00040; // deriva muy lenta
    const elongation = 0.9 + Math.random() * 1.6; // 0.9 a 2.5
    this.particles = [];
    const nP = 3 + Math.floor(Math.random() * 3); // 3, 4 o 5 partículas
    for (let i = 0; i < nP; i++) {
      const t = nP > 1 ? (i / (nP - 1) - 0.5) * 1.6 : 0;
      this.particles.push({
        along: t * elongation,
        perp: (Math.random() - 0.5) * 0.55,
        size: 0.55 + Math.random() * 0.55,
      });
    }

    // Spawn circular dentro del mundo
    const maxR = getWorldRadius();
    const angulo = Math.random() * Math.PI * 2;
    const radio = Math.sqrt(Math.random()) * maxR * 0.75;
    this.x = Math.cos(angulo) * radio;
    this.y = Math.sin(angulo) * radio;

    this.vx = (Math.random() - 0.5) * 0.5;
    this.vy = (Math.random() - 0.5) * 0.5;

    if (esNueva) {
      const a = Math.random() * Math.PI * 2;
      const r = maxR * 1.1;
      this.x = Math.cos(a) * r;
      this.y = Math.sin(a) * r;
    }

    this.opacidadFiltro = 1;
    this.opacidadFiltroObjetivo = filtrosActivos[cat] ? 1 : 0;

    this.fase = Math.random() * Math.PI * 2;
    this.velFase = 0.0005 + Math.random() * 0.001;

    this.tiempoAgitacion = 0;
    this.edad = esNueva ? 0 : DURACION_INTEGRACION + 1;
  }

  actualizar(dt, hwx, hwy, mouseVel, vecinos, isDragging) {
    this.edad += dt;
    this.fase += this.velFase * dt;
    this.brushAngle += this.brushAngleVel * dt;

    if (this.tiempoAgitacion > 0)
      this.tiempoAgitacion = Math.max(0, this.tiempoAgitacion - dt);

    let ax = 0, ay = 0;

    // Variables para detección de compresión local (anti-colapso)
    let crowdCx = 0, crowdCy = 0, crowdN = 0;
    const CROWD_DIST = 85;
    const CROWD_DIST2 = CROWD_DIST * CROWD_DIST;

    // FLOCKING: atracción al mismo color (alcance corto) + repulsión cercana + repulsión inter-color
    for (const o of vecinos) {
      if (o === this) continue;
      const dx = o.x - this.x;
      const dy = o.y - this.y;
      const dist2 = dx * dx + dy * dy;
      if (dist2 < 0.1) continue;
      const dist = Math.sqrt(dist2);

      // Cuenta vecinos cercanos para presión anti-compresión (cualquier color)
      if (dist2 < CROWD_DIST2) {
        crowdCx += o.x;
        crowdCy += o.y;
        crowdN++;
      }

      if (o.categoria === this.categoria) {
        // Atracción suave de alcance corto: forma cúmulos locales, no globales
        if (dist < ATRACCION_DIST && dist > REPULSION_CERCANA_DIST) {
          ax += (dx / dist) * ATRACCION_FUERZA;
          ay += (dy / dist) * ATRACCION_FUERZA;
        }
        // Repulsión cuando muy cerca (evita apilamiento)
        if (dist < REPULSION_CERCANA_DIST) {
          const f = REPULSION_CERCANA_FUERZA * (REPULSION_CERCANA_DIST - dist) / REPULSION_CERCANA_DIST;
          ax -= (dx / dist) * f;
          ay -= (dy / dist) * f;
        }
      } else {
        // Repulsión inter-color: mantiene separación entre clusters de distinto color
        if (dist < REPULSION_INTER_DIST) {
          const f = REPULSION_INTER_FUERZA * (REPULSION_INTER_DIST - dist) / REPULSION_INTER_DIST;
          ax -= (dx / dist) * f;
          ay -= (dy / dist) * f;
        }
      }
    }

    // PRESIÓN ANTI-COLAPSO (mecánica de lámpara de lava)
    // Cuando la densidad local supera un umbral, esta pintita siente presión hacia afuera
    // desde el centroide del enjambre cercano. Más vecinos = más presión.
    // Esto evita que el sistema entero converja en una masa única; produce ciclos
    // orgánicos de compresión y expansión.
    const CROWD_UMBRAL = 14;
    if (crowdN > CROWD_UMBRAL) {
      crowdCx /= crowdN;
      crowdCy /= crowdN;
      let dxC = this.x - crowdCx;
      let dyC = this.y - crowdCy;
      let dC = Math.sqrt(dxC * dxC + dyC * dyC);
      // Si la pintita está casi en el centroide, dispara en dirección aleatoria
      if (dC < 1) {
        const a = Math.random() * Math.PI * 2;
        dxC = Math.cos(a); dyC = Math.sin(a); dC = 1;
      }
      const fPresion = (crowdN - CROWD_UMBRAL) * 0.0022;
      ax += (dxC / dC) * fPresion;
      ay += (dyC / dC) * fPresion;
    }

    // Agitación por velocidad del cursor/dedo
    // Funciona durante drag (móvil): si el dedo se mueve rápido, agita las pintitas cercanas
    // Movimientos lentos solo panean (velocidad bajo umbral)
    if (hwx !== null && mouseVel > 180) {
      const dx = this.x - hwx;
      const dy = this.y - hwy;
      const dist2 = dx * dx + dy * dy;
      const rInfl = 200 / Math.max(0.1, cam.scale);
      if (dist2 < rInfl * rInfl && dist2 > 1) {
        const dist = Math.sqrt(dist2);
        const fd = (rInfl - dist) / rInfl;
        const ve = Math.min(2.8, (mouseVel - 180) / 350);
        const f = fd * ve * 0.38;
        ax += (dx / dist) * f;
        ay += (dy / dist) * f;
        if (f > 0.04) this.tiempoAgitacion = DURACION_AGITACION;
      }
    }

    // Frontera circular MUY laxa: solo actúa si una pintita se aleja muchísimo
    // No define el contorno visible; la forma emerge del flocking + viento + presión
    const distCentro = Math.sqrt(this.x * this.x + this.y * this.y);
    const maxR = getWorldRadius();
    if (distCentro > maxR * 1.2 && distCentro > 0.1) {
      const exceso = distCentro - maxR * 1.2;
      const pull = exceso * 0.0006;
      ax -= (this.x / distCentro) * pull;
      ay -= (this.y / distCentro) * pull;
    }
    // No hay atracción al centro: la presión anti-colapso reemplaza el cohesivo global

    // CAMPO DE VIENTO COHERENTE — transhumancia
    // Fuerzas suaves que varían según posición espacial y tiempo
    // Pintitas cercanas sienten viento similar (migran juntas como cluster)
    // Pintitas distantes sienten viento distinto (migración diferenciada)
    // Dos frecuencias: una lenta de gran escala + una más rápida de detalle
    const wsLento = 0.0026, wtLento = 0.00013;
    const wsRapid = 0.0078, wtRapid = 0.00032;
    const windX =
      Math.sin(this.x * wsLento + tiempoGlobal * wtLento) * 0.70 +
      Math.sin(this.x * wsRapid + this.y * 0.005 + tiempoGlobal * wtRapid + 1.3) * 0.30;
    const windY =
      Math.cos(this.y * wsLento + tiempoGlobal * wtLento * 1.13) * 0.70 +
      Math.cos(this.y * wsRapid + this.x * 0.005 + tiempoGlobal * wtRapid * 1.21 + 0.7) * 0.30;
    ax += windX * 0.0085;
    ay += windY * 0.0085;

    // Ruido browniano leve para textura orgánica (menor que antes: la migración la da el viento)
    ax += (Math.random() - 0.5) * 0.012;
    ay += (Math.random() - 0.5) * 0.012;

    // Cap de aceleración: previene runaway forces si hay muchos vecinos atrayendo
    const accMax = 0.08;
    const a2 = ax * ax + ay * ay;
    if (a2 > accMax * accMax) {
      const a = Math.sqrt(a2);
      ax = (ax / a) * accMax;
      ay = (ay / a) * accMax;
    }

    // Damping moderado: conserva movimiento perpetuo
    this.vx = (this.vx + ax) * 0.975;
    this.vy = (this.vy + ay) * 0.975;

    // Velocidad máxima
    const velMax = 1.6;
    const v2 = this.vx * this.vx + this.vy * this.vy;
    if (v2 > velMax * velMax) {
      const v = Math.sqrt(v2);
      this.vx = (this.vx / v) * velMax;
      this.vy = (this.vy / v) * velMax;
    }

    this.x += this.vx;
    this.y += this.vy;

    this.opacidadFiltro += (this.opacidadFiltroObjetivo - this.opacidadFiltro) * 0.05;
  }

  contieneEnMundo(wx, wy) {
    const dx = wx - this.x;
    const dy = wy - this.y;
    // Hit-test sobre la zona visible de la masa fluida (incluye el halo del blur)
    const r = BLOB_RADIO_BASE * this.tamFactor * 1.4;
    return dx * dx + dy * dy < r * r;
  }
}

// ============================================================
// SPATIAL HASH para flocking O(n)
// ============================================================
const CELL_SIZE = 360;
let spatialHash = new Map();

function rebuildSpatialHash() {
  spatialHash.clear();
  for (const p of pintitas) {
    const cx = Math.floor(p.x / CELL_SIZE);
    const cy = Math.floor(p.y / CELL_SIZE);
    const key = cx * 100000 + cy;
    let cell = spatialHash.get(key);
    if (!cell) { cell = []; spatialHash.set(key, cell); }
    cell.push(p);
  }
}

function getVecinos(x, y) {
  const cx = Math.floor(x / CELL_SIZE);
  const cy = Math.floor(y / CELL_SIZE);
  const vecinos = [];
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      const key = (cx + dx) * 100000 + (cy + dy);
      const cell = spatialHash.get(key);
      if (cell) vecinos.push(...cell);
    }
  }
  return vecinos;
}

// ============================================================
// ESTADO GLOBAL
// ============================================================
const pintitas = [];
const pintitasMap = new Map();

let tiempoGlobal = 0;
let ultimoTiempo = performance.now();

let mouseVel = 0;
let mousePrevX = null, mousePrevY = null;
let ultimoMouseTime = performance.now();
let hoverWorldX = null, hoverWorldY = null;

let isDragging = false;
let dragStartSX = 0, dragStartSY = 0;
let dragDistance = 0;

// ============================================================
// RENDER LOOP — sistema metaball (gotas de aceite que se fusionan)
// ============================================================
function render() {
  const ahora = performance.now();
  const dt = Math.min(50, ahora - ultimoTiempo);
  ultimoTiempo = ahora;
  tiempoGlobal += dt;

  // Suavizar cámara
  const lerp = 0.12;
  cam.x += (cam.tx - cam.x) * lerp;
  cam.y += (cam.ty - cam.y) * lerp;
  cam.scale += (cam.tscale - cam.scale) * lerp;

  // Decaimiento de velocidad de mouse
  mouseVel *= Math.pow(0.92, dt / 16);

  // Respiración global
  const resp = Math.sin(tiempoGlobal * 0.00045);

  // ─── FÍSICA ───
  // Spatial hash y actualización de posiciones (en espacio-mundo)
  rebuildSpatialHash();
  for (const p of pintitas) {
    const vecinos = getVecinos(p.x, p.y);
    p.actualizar(dt, hoverWorldX, hoverWorldY, mouseVel, vecinos, isDragging);
  }

  // ─── RENDER ───

  // Limpio totalmente el canvas principal (sin fade de fondo: el fondo será negro puro)
  ctx.globalCompositeOperation = 'source-over';
  ctx.clearRect(0, 0, W, H);

  // CAPA 1: METABALL FLUIDO
  fluidoCtx.clearRect(0, 0, W, H);
  fluidoCtx.globalCompositeOperation = 'source-over';

  for (const p of pintitas) {
    if (p.opacidadFiltro < 0.005) continue;

    // World → screen
    const sx = (p.x - cam.x) * cam.scale + W / 2;
    const sy = (p.y - cam.y) * cam.scale + H / 2;

    // Radio base en pixels (escala con cámara)
    const escalaResp = Math.sqrt(p.tamFactor);
    const respProp = Math.sin(p.fase) * 0.9 * escalaResp;
    const respGlob = resp * 1.2 * escalaResp;
    const radioMundo = BLOB_RADIO_BASE * p.tamFactor + respProp + respGlob;
    const sr = radioMundo * cam.scale;

    // Frustum cull (con margen para la pincelada extendida)
    const cullMargin = sr * 4 + 40;
    if (sr < 0.3) continue;
    if (sx + cullMargin < 0 || sx - cullMargin > W) continue;
    if (sy + cullMargin < 0 || sy - cullMargin > H) continue;

    const fade = Math.min(1, p.edad / 4500);
    fluidoCtx.globalAlpha = BLOB_ALPHA * fade * p.opacidadFiltro * p.opacFactor;
    fluidoCtx.fillStyle = CATEGORIAS[p.categoria].color;

    // PINCELADA: dibuja las partículas alineadas según brushAngle
    // Cada partícula es un círculo pequeño; el conjunto forma una pincelada texturizada
    const cosA = Math.cos(p.brushAngle);
    const sinA = Math.sin(p.brushAngle);
    for (const part of p.particles) {
      const px = sx + (part.along * cosA - part.perp * sinA) * sr;
      const py = sy + (part.along * sinA + part.perp * cosA) * sr;
      const psize = Math.max(0.5, part.size * sr * 0.85);
      fluidoCtx.beginPath();
      fluidoCtx.arc(px, py, psize, 0, Math.PI * 2);
      fluidoCtx.fill();
    }
  }

  // Componer la capa fluida sobre el canvas principal con filtro blur+contrast
  // → blur expande y solapa las gotas vecinas; contrast snap-ea bordes definidos
  // → resultado: metaballs (gotas que se fusionan al acercarse, se separan al alejarse)
  const blur = Math.min(60, Math.max(3, BLUR_PX * cam.scale));
  ctx.filter = `blur(${blur}px) contrast(${CONTRAST_AMOUNT})`;
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
  ctx.drawImage(fluidoCanvas, 0, 0, W, H);
  ctx.filter = 'none';

  // CAPA INTERMEDIA: grano SOLO sobre las zonas de color
  // 1) Construyo una máscara de grano: pattern + destination-in con la imagen del canvas
  // 2) El resultado tiene grano solo donde había color en el canvas principal
  // 3) Lo aplico al canvas con soft-light → textura pictórica sin tocar el fondo negro
  if (!granoPattern) granoPattern = granoMaskCtx.createPattern(granoCanvas, 'repeat');
  granoMaskCtx.globalCompositeOperation = 'source-over';
  granoMaskCtx.fillStyle = granoPattern;
  granoMaskCtx.fillRect(0, 0, W, H);
  granoMaskCtx.globalCompositeOperation = 'destination-in';
  granoMaskCtx.drawImage(canvas, 0, 0, W, H);

  ctx.globalCompositeOperation = 'soft-light';
  ctx.globalAlpha = 0.75;
  ctx.drawImage(granoMaskCanvas, 0, 0, W, H);
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';

  // CAPA 2: CHISPAS (nodos individuales revelados)
  // Solo se dibujan cuando la pintita está agitada o es reciente
  // source-over (no screen): evita acumulación hacia blanco
  ctx.globalCompositeOperation = 'source-over';
  for (const p of pintitas) {
    if (p.opacidadFiltro < 0.005) continue;
    const fAgit = p.tiempoAgitacion / DURACION_AGITACION;
    const fEdad = Math.max(0, 1 - p.edad / DURACION_INTEGRACION);
    const chispa = Math.max(fAgit, fEdad * 0.85);
    if (chispa < 0.03) continue;

    const sx = (p.x - cam.x) * cam.scale + W / 2;
    const sy = (p.y - cam.y) * cam.scale + H / 2;
    const escalaResp = Math.sqrt(p.tamFactor);
    const radioChispa = RADIO_CHISPA * escalaResp * cam.scale;

    if (sx + radioChispa < 0 || sx - radioChispa > W) continue;
    if (sy + radioChispa < 0 || sy - radioChispa > H) continue;

    ctx.globalAlpha = OPACIDAD_CHISPA * chispa * p.opacidadFiltro;
    ctx.drawImage(gradChispa[p.categoria],
      sx - radioChispa, sy - radioChispa,
      radioChispa * 2, radioChispa * 2);
  }
  ctx.globalAlpha = 1;

  // CAPA FINAL: fondo negro detrás de todo lo demás
  // Pulsación atmosférica muy lenta y muy sutil: ciclo de ~90 segundos
  // Variación de luminosidad entre rgb(1,1,2) y rgb(5,5,7) — apenas perceptible
  const pulse = (Math.sin(tiempoGlobal * 0.00007) + 1) * 0.5;
  const bg = Math.floor(1 + pulse * 4);
  ctx.globalCompositeOperation = 'destination-over';
  ctx.fillStyle = `rgb(${bg}, ${bg}, ${bg + 2})`;
  ctx.fillRect(0, 0, W, H);
  ctx.globalCompositeOperation = 'source-over';

  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// ============================================================
// CONTROLES: ZOOM Y PAN
// ============================================================

// WHEEL - zoom centrado en cursor (mouse) o pinch de trackpad (ctrlKey)
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  // Trackpad pinch: ctrlKey activado (estándar en macOS/Windows)
  // Mouse wheel: ctrlKey ausente
  const factor = Math.exp(-e.deltaY * (e.ctrlKey ? 0.012 : 0.0018));
  const newScale = Math.max(cam.MIN_SCALE, Math.min(cam.MAX_SCALE, cam.tscale * factor));

  // Zoom centrado en posición del cursor
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const wx = (sx - W / 2) / cam.tscale + cam.tx;
  const wy = (sy - H / 2) / cam.tscale + cam.ty;

  cam.tscale = newScale;
  cam.tx = wx - (sx - W / 2) / newScale;
  cam.ty = wy - (sy - H / 2) / newScale;
}, { passive: false });

// MOUSE DRAG - pan
canvas.addEventListener('mousedown', (e) => {
  isDragging = true;
  dragDistance = 0;
  dragStartSX = e.clientX;
  dragStartSY = e.clientY;
});

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;

  if (isDragging) {
    const dx = e.clientX - dragStartSX;
    const dy = e.clientY - dragStartSY;
    dragDistance += Math.abs(dx) + Math.abs(dy);
    cam.tx -= dx / cam.scale;
    cam.ty -= dy / cam.scale;
    cam.x = cam.tx; cam.y = cam.ty; // snap inmediato durante pan para responsividad
    dragStartSX = e.clientX;
    dragStartSY = e.clientY;
  } else {
    // Hover: velocidad para agitación
    if (mousePrevX !== null) {
      const t = performance.now();
      const ddt = Math.max(1, t - ultimoMouseTime);
      const vdx = sx - mousePrevX, vdy = sy - mousePrevY;
      const v = Math.sqrt(vdx * vdx + vdy * vdy) / ddt * 1000;
      mouseVel = mouseVel * 0.6 + v * 0.4;
      ultimoMouseTime = t;
    }
    mousePrevX = sx; mousePrevY = sy;
    const w = screenToWorld(sx, sy);
    hoverWorldX = w.x; hoverWorldY = w.y;
  }
});

canvas.addEventListener('mouseup', async (e) => {
  isDragging = false;
  if (dragDistance < 6) {
    // Click sin drag: intentar abrir relato
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;
    const w = screenToWorld(sx, sy);
    let target = null, best = Infinity;
    for (const p of pintitas) {
      if (p.contieneEnMundo(w.x, w.y)) {
        const dx = w.x - p.x, dy = w.y - p.y;
        const d = dx * dx + dy * dy;
        if (d < best) { best = d; target = p; }
      }
    }
    if (target) await abrirRelato(target.respuestaId);
  }
});

canvas.addEventListener('mouseleave', () => {
  isDragging = false;
  hoverWorldX = null;
  hoverWorldY = null;
  mouseVel = 0;
});

// TOUCH
let lastPinchDist = 0;
let pinchActivo = false;
let touchPanStartX = 0, touchPanStartY = 0;
let touchPanLastX = 0, touchPanLastY = 0;
let touchDragDist = 0;

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  pinchActivo = e.touches.length >= 2;
  touchDragDist = 0;

  if (e.touches.length === 1) {
    const t = e.touches[0];
    touchPanStartX = t.clientX;
    touchPanStartY = t.clientY;
    touchPanLastX = t.clientX;
    touchPanLastY = t.clientY;
    isDragging = true;
  } else if (e.touches.length >= 2) {
    const t1 = e.touches[0], t2 = e.touches[1];
    const dx = t2.clientX - t1.clientX, dy = t2.clientY - t1.clientY;
    lastPinchDist = Math.sqrt(dx * dx + dy * dy);
    isDragging = false;
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();

  if (e.touches.length >= 2) {
    // Pinch zoom centrado entre los dedos
    pinchActivo = true;
    isDragging = false;
    const t1 = e.touches[0], t2 = e.touches[1];
    const dx = t2.clientX - t1.clientX, dy = t2.clientY - t1.clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const factor = dist / lastPinchDist;
    const newScale = Math.max(cam.MIN_SCALE, Math.min(cam.MAX_SCALE, cam.tscale * factor));
    const cx = (t1.clientX + t2.clientX) / 2;
    const cy = (t1.clientY + t2.clientY) / 2;
    const wx = (cx - W / 2) / cam.tscale + cam.tx;
    const wy = (cy - H / 2) / cam.tscale + cam.ty;
    cam.tscale = newScale;
    cam.tx = wx - (cx - W / 2) / newScale;
    cam.ty = wy - (cy - H / 2) / newScale;
    lastPinchDist = dist;
  } else if (e.touches.length === 1 && !pinchActivo) {
    // Single touch drag: pan + tracking de velocidad para agitación
    const t = e.touches[0];
    const dx = t.clientX - touchPanLastX;
    const dy = t.clientY - touchPanLastY;
    touchDragDist += Math.abs(dx) + Math.abs(dy);

    // Paneo de cámara
    cam.tx -= dx / cam.scale;
    cam.ty -= dy / cam.scale;
    cam.x = cam.tx; cam.y = cam.ty;
    touchPanLastX = t.clientX;
    touchPanLastY = t.clientY;

    // Tracking de velocidad y posición en mundo para que el dedo agite las pintitas
    // Si movimiento es lento → solo panea. Si es rápido → además agita.
    const rect = canvas.getBoundingClientRect();
    const sx = t.clientX - rect.left;
    const sy = t.clientY - rect.top;
    if (mousePrevX !== null) {
      const ahora = performance.now();
      const ddt = Math.max(1, ahora - ultimoMouseTime);
      const vdx = sx - mousePrevX, vdy = sy - mousePrevY;
      const v = Math.sqrt(vdx * vdx + vdy * vdy) / ddt * 1000;
      mouseVel = mouseVel * 0.6 + v * 0.4;
      ultimoMouseTime = ahora;
    }
    mousePrevX = sx; mousePrevY = sy;
    const wp = screenToWorld(sx, sy);
    hoverWorldX = wp.x; hoverWorldY = wp.y;
  }
}, { passive: false });

canvas.addEventListener('touchend', async (e) => {
  if (e.touches.length === 0) {
    if (!pinchActivo && touchDragDist < 10) {
      // Tap (sin drag): abrir relato
      const rect = canvas.getBoundingClientRect();
      const sx = touchPanStartX - rect.left;
      const sy = touchPanStartY - rect.top;
      const w = screenToWorld(sx, sy);
      let target = null, best = Infinity;
      for (const p of pintitas) {
        if (p.contieneEnMundo(w.x, w.y)) {
          const dx = w.x - p.x, dy = w.y - p.y;
          const d = dx * dx + dy * dy;
          if (d < best) { best = d; target = p; }
        }
      }
      if (target) await abrirRelato(target.respuestaId);
    }
    pinchActivo = false;
    isDragging = false;
  } else if (e.touches.length === 1 && pinchActivo) {
    // De dos dedos a uno: re-anclar el touch restante como nuevo punto de pan
    // y desactivar pinchActivo para que el siguiente touchmove panee correctamente
    const t = e.touches[0];
    touchPanStartX = t.clientX;
    touchPanStartY = t.clientY;
    touchPanLastX = t.clientX;
    touchPanLastY = t.clientY;
    touchDragDist = 100; // ya no se considera tap
    pinchActivo = false;
    isDragging = true;
  }
}, { passive: false });

// ============================================================
// MODAL
// ============================================================
async function abrirRelato(respuestaId) {
  try {
    const res = await fetch(`${API_BASE}/relato/${respuestaId}`);
    const data = await res.json();
    if (data.status === 'error') return;
    document.getElementById('modal-texto').textContent = data.relato || '(sin contenido)';
    const cats = data.categorias_activadas || {};
    document.getElementById('modal-cats').innerHTML = Object.keys(cats).map(cat => {
      const info = CATEGORIAS[cat] || { color: '#888', nombre: cat };
      return `<span class="modal-cat-chip" style="background:${info.color}">${info.nombre}</span>`;
    }).join('');
    document.getElementById('modal').classList.add('activo');
  } catch(e) { console.error(e); }
}
function cerrarModal() { document.getElementById('modal').classList.remove('activo'); }
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') cerrarModal();
});
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') cerrarModal(); });

// ============================================================
// LEYENDA INTERACTIVA
// ============================================================
function clickCategoria(cat, soloEsta) {
  if (soloEsta) {
    const yaEsSolo = filtrosActivos[cat] &&
      Object.entries(filtrosActivos).every(([k, v]) => k === cat ? v : !v);
    if (yaEsSolo) {
      for (const k of Object.keys(filtrosActivos)) filtrosActivos[k] = true;
    } else {
      for (const k of Object.keys(filtrosActivos)) filtrosActivos[k] = (k === cat);
    }
  } else {
    filtrosActivos[cat] = !filtrosActivos[cat];
  }
  for (const p of pintitas) {
    p.opacidadFiltroObjetivo = filtrosActivos[p.categoria] ? 1 : 0;
  }
  actualizarLeyenda();
}

function actualizarLeyenda() {
  const cont = document.getElementById('leyenda');
  cont.innerHTML = Object.entries(CATEGORIAS).map(([k, v]) => {
    const cls = filtrosActivos[k] ? '' : ' apagado';
    return `<div class="leyenda-item${cls}" data-cat="${k}" role="button" tabindex="0" title="Click: ocultar · Shift+click: aislar">
      <span class="leyenda-dot" style="background:${v.color}"></span>${v.nombre}
    </div>`;
  }).join('');
  cont.querySelectorAll('.leyenda-item').forEach(el => {
    el.addEventListener('click', (e) => clickCategoria(el.dataset.cat, e.shiftKey));
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault(); clickCategoria(el.dataset.cat, e.shiftKey);
      }
    });
  });
}
actualizarLeyenda();

// ============================================================
// CONEXIÓN AL SERVIDOR
// ============================================================
let ultimaPintitaId = 0;

async function inicializar() {
  try {
    const res = await fetch(`${API_BASE}/pintitas_recientes?n=4000`);
    const data = await res.json();
    totalRelatos = data.length > 0 ? Math.max(64, Math.round(data.length / 3.5)) : 64;
    data.reverse();
    for (const p of data) {
      if (!pintitasMap.has(p.id)) {
        pintitas.push(new Pintita(p.id, p.respuesta_id, p.categoria, false));
        pintitasMap.set(p.id, true);
        if (p.id > ultimaPintitaId) ultimaPintitaId = p.id;
      }
    }
    actualizarEstado();
    setTimeout(ajustarCamaraInicial, 100);
  } catch(e) {
    console.error(e);
    marcarSinConexion();
  }
}

async function consultarNuevas() {
  try {
    const res = await fetch(`${API_BASE}/pintitas_recientes?n=100`);
    const data = await res.json();
    const nuevas = data.filter(p => p.id > ultimaPintitaId);
    nuevas.reverse();
    for (const p of nuevas) {
      if (!pintitasMap.has(p.id)) {
        setTimeout(() => {
          pintitas.push(new Pintita(p.id, p.respuesta_id, p.categoria, true));
          pintitasMap.set(p.id, true);
        }, Math.random() * 1500);
        if (p.id > ultimaPintitaId) ultimaPintitaId = p.id;
      }
    }
    actualizarEstado();
  } catch(e) { marcarSinConexion(); }
}

async function actualizarEstado() {
  try {
    const res = await fetch(`${API_BASE}/estado`);
    const data = await res.json();
    totalRelatos = data.total_respuestas || totalRelatos;
    document.getElementById('n-respuestas').textContent = data.total_respuestas;
    document.getElementById('estado-dot').classList.add('vivo');
    document.getElementById('estado-texto').textContent = 'corpus activo';
  } catch(e) { marcarSinConexion(); }
}

function marcarSinConexion() {
  document.getElementById('estado-dot').classList.remove('vivo');
  document.getElementById('estado-texto').textContent = 'sin conexión';
}

inicializar();
setInterval(consultarNuevas, POLL_INTERVAL);

// ============================================================
// SHAKE DEL TELÉFONO
// ============================================================
let ultimoShake = 0, motionActivo = false;

function activarMovimiento() {
  if (motionActivo) return;
  motionActivo = true;
  window.addEventListener('devicemotion', (e) => {
    const acc = e.accelerationIncludingGravity || e.acceleration;
    if (!acc) return;
    const ax = acc.x || 0, ay = acc.y || 0, az = acc.z || 0;
    const mag = Math.sqrt(ax * ax + ay * ay + az * az);
    if (mag > 14) {
      const ahora = performance.now();
      if (ahora - ultimoShake > 200) {
        ultimoShake = ahora;
        // Intensidad muy gradual: a más agitación, más movimiento
        // Cada pintita recibe su propia dirección y magnitud aleatorias
        // (sin coordinación radial ni traslación global → no parece supernova)
        const inten = Math.min(1.4, (mag - 14) * 0.06);
        for (const p of pintitas) {
          const a = Math.random() * Math.PI * 2;
          const m = inten * (0.4 + Math.random() * 0.6);
          p.vx += Math.cos(a) * m;
          p.vy += Math.sin(a) * m;
        }
      }
    }
  });
  const btn = document.getElementById('btn-motion');
  if (btn) btn.style.display = 'none';
}

const esTouch = 'ontouchstart' in window;
const necesitaPermiso = typeof DeviceMotionEvent !== 'undefined' &&
  typeof DeviceMotionEvent.requestPermission === 'function';

if (esTouch) {
  if (necesitaPermiso) {
    const btn = document.createElement('button');
    btn.id = 'btn-motion';
    btn.textContent = 'tocar para activar movimiento';
    btn.style.cssText = `position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      background:rgba(20,20,20,0.9);color:#ccc;border:0.5px solid #444;
      padding:1rem 1.5rem;font-family:'Space Mono',monospace;font-size:11px;
      letter-spacing:0.15em;cursor:pointer;z-index:200;backdrop-filter:blur(8px);`;
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      try {
        const resp = await DeviceMotionEvent.requestPermission();
        if (resp === 'granted') activarMovimiento();
        else { btn.textContent = 'permiso denegado'; setTimeout(() => btn.style.display='none', 2000); }
      } catch(err) { btn.style.display = 'none'; }
    });
    document.body.appendChild(btn);
  } else if (typeof DeviceMotionEvent !== 'undefined') {
    activarMovimiento();
  }
}
