<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Espéculo(ar) — galaxia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital@0;1&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #030303; }
  body { font-family: 'Space Mono', monospace; }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }

  #overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 2;
    padding: 1.8rem;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .header-bar { display: flex; justify-content: space-between; align-items: flex-start; }
  .titulo { font-size: 11px; letter-spacing: 0.2em; color: #555; }
  .subtitulo { font-size: 10px; letter-spacing: 0.1em; color: #333; margin-top: 5px; font-style: italic; }
  .contador { text-align: right; }
  .n-respuestas { font-size: 38px; font-weight: 300; color: #888; line-height: 1; }
  .n-label { font-size: 9px; color: #444; letter-spacing: 0.2em; margin-top: 3px; }

  .footer-bar { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 0.8rem; }
  .leyenda {
    display: flex; flex-wrap: wrap; gap: 8px 14px; max-width: 78%;
    pointer-events: auto;
  }
  .leyenda-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 9px; color: #777; letter-spacing: 0.04em;
    cursor: pointer; user-select: none; padding: 3px 2px;
    transition: opacity 0.25s, color 0.25s;
  }
  .leyenda-item:hover { color: #bbb; }
  .leyenda-item.apagado { opacity: 0.28; }
  .leyenda-dot { width: 8px; height: 8px; border-radius: 50%; transition: opacity 0.25s; flex-shrink: 0; }

  .estado { text-align: right; }
  .estado-dot { width: 5px; height: 5px; border-radius: 50%; background: #1a1a1a; display: inline-block; margin-right: 5px; vertical-align: middle; }
  .estado-dot.vivo { background: #1D9E75; box-shadow: 0 0 6px rgba(29,158,117,0.5); }
  .estado-texto { font-size: 9px; color: #444; letter-spacing: 0.12em; }

  .zoom-hint {
    position: fixed; bottom: 1.2rem; left: 50%;
    transform: translateX(-50%);
    font-size: 9px; color: #333; letter-spacing: 0.15em;
    pointer-events: none; z-index: 3;
  }

  #modal {
    position: fixed; inset: 0; z-index: 100;
    display: none; align-items: center; justify-content: center;
    background: rgba(3,3,3,0.9); padding: 2rem;
    backdrop-filter: blur(10px);
  }
  #modal.activo { display: flex; }
  .modal-contenido {
    background: #0a0a0a; border: 0.5px solid #1e1e1e;
    max-width: 600px; width: 100%; padding: 2.5rem;
    max-height: 80vh; overflow-y: auto;
    color: #ccc; font-family: 'Space Mono', monospace;
    font-size: 13.5px; line-height: 1.75; position: relative;
  }
  .modal-categorias { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.4rem; }
  .modal-cat-chip { font-size: 9.5px; padding: 3px 9px; border-radius: 10px; color: #fff; letter-spacing: 0.04em; }
  .modal-relato { white-space: pre-wrap; color: #d8d8d8; }
  .modal-cerrar {
    position: absolute; top: 1rem; right: 1.4rem;
    background: transparent; border: none; color: #555;
    font-size: 11px; cursor: pointer; font-family: inherit; letter-spacing: 0.1em;
  }
  .modal-cerrar:hover { color: #ccc; }

  @media (max-width: 640px) {
    #overlay { padding: 1.1rem; }
    .n-respuestas { font-size: 28px; }
    .leyenda-item { font-size: 8px; }
    .modal-contenido { padding: 1.4rem; font-size: 12.5px; }
  }
</style>
</head>
<body>
<canvas id="lienzo" aria-label="Galaxia colectiva de Espéculo(ar)"></canvas>

<div id="overlay">
  <div class="header-bar">
    <div>
      <div class="titulo">ESPÉCULO(AR)</div>
      <div class="subtitulo">galaxia colectiva · tecnologías de género</div>
    </div>
    <div class="contador">
      <div class="n-respuestas" id="n-respuestas">—</div>
      <div class="n-label">VOCES</div>
    </div>
  </div>
  <div class="footer-bar">
    <div class="leyenda" id="leyenda"></div>
    <div class="estado">
      <span class="estado-dot" id="estado-dot"></span>
      <span class="estado-texto" id="estado-texto">conectando</span>
    </div>
  </div>
</div>

<div class="zoom-hint">agita el cursor para revelar relatos · pellizca / rueda para navegar</div>

<div id="modal" role="dialog" aria-modal="true">
  <div class="modal-contenido">
    <button class="modal-cerrar" onclick="cerrarModal()">cerrar</button>
    <div class="modal-categorias" id="modal-cats"></div>
    <div class="modal-relato" id="modal-texto"></div>
  </div>
</div>

<script>
// ============================================================
// CONFIGURACIÓN
// ============================================================
const API_BASE = 'https://especuloar-exp2.onrender.com';
const POLL_INTERVAL = 5000;

const CATEGORIAS = {
  'dolor_fisico':              { color: '#FF2424', nombre: 'Dolor físico' },
  'frio_metal':                { color: '#2EC4D8', nombre: 'Materiales desagradables/fríos' },
  'materiales_agradables':     { color: '#E8935A', nombre: 'Materiales agradables / cálidos' },
  'miedo_ansiedad':            { color: '#A01F35', nombre: 'Miedo / ansiedad / preocupación' },
  'sensaciones_agradables':    { color: '#D4847A', nombre: 'Sensaciones agradables / seguridad / calma' },
  'normalizacion':             { color: '#6BBF8A', nombre: 'Normalización / resignación' },
  'vivencia_sexual_traumatica':{ color: '#B814E8', nombre: 'Violencia sexual' },
  'profesional_masculino':     { color: '#9E9E9E', nombre: 'Profesional de salud masculino presente' },
  'profesional_femenino':      { color: '#D4B800', nombre: 'Profesional mujer' }
};

const filtrosActivos = {};
for (const cat of Object.keys(CATEGORIAS)) filtrosActivos[cat] = true;

// Posiciones base de cada isla en espacio-mundo (para worldFactor=1)
// Distribuidas para ocupar toda la pantalla como archipiélago orgánico
const POSICIONES_BASE = {
  'dolor_fisico':              { x: -680, y: -420 },
  'frio_metal':                { x:   40, y: -580 },
  'materiales_agradables':     { x:  720, y: -340 },
  'miedo_ansiedad':            { x: -780, y:   40 },
  'sensaciones_agradables':    { x:  700, y:  330 },
  'normalizacion':             { x:   60, y:  560 },
  'vivencia_sexual_traumatica':{ x: -520, y:  580 },
  'profesional_masculino':     { x:  560, y:   50 },
  'profesional_femenino':      { x:  300, y: -130 },
};

// ============================================================
// CANVAS Y DIMENSIONES
// ============================================================
const canvas = document.getElementById('lienzo');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;

function ajustarCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
}
ajustarCanvas();
window.addEventListener('resize', ajustarCanvas);

// ============================================================
// CÁMARA (espacio-mundo navegable)
// ============================================================
const cam = {
  x: 0, y: 0,         // posición actual (suavizada)
  scale: 0.5,          // zoom actual (suavizado)
  tx: 0, ty: 0,        // objetivo de posición
  tscale: 0.5,         // objetivo de zoom
  MIN_SCALE: 0.05,
  MAX_SCALE: 6,
};

function screenToWorld(sx, sy) {
  return {
    x: (sx - W / 2) / cam.scale + cam.x,
    y: (sy - H / 2) / cam.scale + cam.y,
  };
}

function ajustarCamaraGalaxia() {
  const wf = getWorldFactor();
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  Object.values(POSICIONES_BASE).forEach(p => {
    const x = p.x * wf, y = p.y * wf;
    if (x < minX) minX = x; if (x > maxX) maxX = x;
    if (y < minY) minY = y; if (y > maxY) maxY = y;
  });
  const pad = 220 * wf;
  const worldW = (maxX - minX) + pad * 2;
  const worldH = (maxY - minY) + pad * 2;
  const scale = Math.min(W / worldW, H / worldH) * 0.88;
  cam.tx = (minX + maxX) / 2;
  cam.ty = (minY + maxY) / 2;
  cam.tscale = Math.max(cam.MIN_SCALE, Math.min(0.9, scale));
  cam.x = cam.tx; cam.y = cam.ty; cam.scale = cam.tscale;
}

// ============================================================
// FACTOR DE MUNDO (crece con el corpus)
// ============================================================
let totalRelatos = 64;
function getWorldFactor() {
  return Math.sqrt(Math.max(64, totalRelatos) / 64);
}

// ============================================================
// ZONAS (islas orgánicas que se mueven como medusas)
// ============================================================
let ZONAS = {};

function actualizarZonas(tiempo) {
  const wf = getWorldFactor();
  const cats = Object.keys(CATEGORIAS);

  // Redistribuir si hay filtros activos
  const activas = cats.filter(c => filtrosActivos[c]);
  const nActivas = activas.length || 1;

  cats.forEach((cat, i) => {
    const posBase = POSICIONES_BASE[cat] || { x: 0, y: 0 };
    // Deriva orgánica independiente por isla (como medusas)
    const amp = 55 * wf;
    const velX = 0.000038 + i * 0.000007;
    const velY = 0.000031 + i * 0.000009;
    const phX = i * 2.31;
    const phY = i * 1.73;

    let baseX = posBase.x * wf;
    let baseY = posBase.y * wf;

    // Si está filtrada, reposicionar en círculo con las activas
    if (filtrosActivos[cat]) {
      const idxActivo = activas.indexOf(cat);
      const angulo = (idxActivo / nActivas) * Math.PI * 2 - Math.PI / 2;
      const r = Math.min(W, H) * 0.32 / cam.scale;
      baseX = Math.cos(angulo) * r;
      baseY = Math.sin(angulo) * r;
    }

    ZONAS[cat] = {
      x: baseX + Math.sin(tiempo * velX + phX) * amp,
      y: baseY + Math.cos(tiempo * velY + phY) * amp,
    };
  });
}

// ============================================================
// CENTROIDES POR CATEGORÍA
// ============================================================
function calcularCentroides() {
  const c = {};
  for (const cat of Object.keys(CATEGORIAS)) {
    c[cat] = { sx: 0, sy: 0, count: 0, x: 0, y: 0 };
  }
  for (const p of pintitas) {
    const g = c[p.categoria];
    if (g) { g.sx += p.x; g.sy += p.y; g.count++; }
  }
  for (const cat of Object.keys(c)) {
    const g = c[cat];
    if (g.count > 0) { g.x = g.sx / g.count; g.y = g.sy / g.count; }
  }
  return c;
}

// ============================================================
// PINTITA — partícula nebulosa en espacio-mundo
// ============================================================
function hexToRgb(hex) {
  return {
    r: parseInt(hex.slice(1, 3), 16),
    g: parseInt(hex.slice(3, 5), 16),
    b: parseInt(hex.slice(5, 7), 16),
  };
}

const RADIO_BASE = 72;
const OPACIDAD_BASE = 0.052;
const DURACION_AGITACION = 2800;

class Pintita {
  constructor(id, respId, cat, esNueva = false) {
    this.id = id;
    this.respuestaId = respId;
    this.categoria = cat;
    this.color = CATEGORIAS[cat]?.color || '#888';
    this.rgb = hexToRgb(this.color);

    this.semillaAng = Math.random() * Math.PI * 2;
    this.semillaRad = Math.sqrt(Math.random());

    this.bx = 0; this.by = 0;
    this.recalcularBase();
    this.x = this.bx; this.y = this.by;

    this.ox = 0; this.oy = 0;
    this.ovx = 0; this.ovy = 0;

    if (esNueva) {
      // Aparece en posición aleatoria del espacio-mundo visible y viaja a su isla
      const wf = getWorldFactor();
      const rx = (Math.random() - 0.5) * W / cam.scale * 0.9 + cam.x;
      const ry = (Math.random() - 0.5) * H / cam.scale * 0.9 + cam.y;
      this.ox = rx - this.bx;
      this.oy = ry - this.by;
    }

    this.opacidadFiltro = 1;
    this.opacidadFiltroObjetivo = filtrosActivos[cat] ? 1 : 0;

    this.fase = Math.random() * Math.PI * 2;
    this.velFase = 0.0005 + Math.random() * 0.001;

    this.tiempoAgitacion = 0;
    this.edad = 0;
  }

  recalcularBase() {
    const zona = ZONAS[this.categoria];
    if (!zona) { this.bx = 0; this.by = 0; return; }
    const wf = getWorldFactor();
    // Dispersión escala con el mundo para que las islas mantengan tamaño relativo
    const disp = 180 * wf;
    const r = this.semillaRad * disp;
    this.bx = zona.x + Math.cos(this.semillaAng) * r;
    this.by = zona.y + Math.sin(this.semillaAng) * r;
  }

  actualizar(dt, hwx, hwy, mouseVel, centroides) {
    this.edad += dt;
    this.fase += this.velFase * dt;

    if (this.tiempoAgitacion > 0)
      this.tiempoAgitacion = Math.max(0, this.tiempoAgitacion - dt);

    // Agitación por velocidad del mouse (en mundo)
    const UMBRAL = 180;
    if (hwx !== null && mouseVel > UMBRAL) {
      const dx = (this.bx + this.ox) - hwx;
      const dy = (this.by + this.oy) - hwy;
      const dist2 = dx * dx + dy * dy;
      const rInfl = 190 / cam.scale; // influencia en mundo
      if (dist2 < rInfl * rInfl && dist2 > 0.1) {
        const dist = Math.sqrt(dist2);
        const fd = (rInfl - dist) / rInfl;
        const ve = Math.min(2.8, (mouseVel - UMBRAL) / 350);
        const f = fd * ve * 0.7;
        this.ovx += (dx / dist) * f;
        this.ovy += (dy / dist) * f;
        if (f > 0.04) this.tiempoAgitacion = DURACION_AGITACION;
      }
    }

    const fa = this.tiempoAgitacion / DURACION_AGITACION;

    // Atracción al centroide desactivada durante scatter
    if (centroides && fa < 0.1) {
      const c = centroides[this.categoria];
      if (c && c.count > 1) {
        const dx = c.x - this.x;
        const dy = c.y - this.y;
        const f = 0.00015;
        this.ovx += dx * f;
        this.ovy += dy * f;
      }
    }

    // Resorte: muy débil en scatter
    const k = 0.0055 * (1 - fa * 0.95);
    this.ovx -= this.ox * k;
    this.ovy -= this.oy * k;

    // Damping: más alto en scatter para mantener separación
    const damp = 0.955 + fa * 0.018;
    this.ovx *= damp;
    this.ovy *= damp;

    // Ruido browniano fluido
    this.ovx += (Math.random() - 0.5) * 0.025;
    this.ovy += (Math.random() - 0.5) * 0.025;

    this.ox += this.ovx;
    this.oy += this.ovy;

    this.opacidadFiltro += (this.opacidadFiltroObjetivo - this.opacidadFiltro) * 0.05;

    this.x = this.bx + this.ox;
    this.y = this.by + this.oy;
  }

  dibujar(ctx, resp) {
    if (this.opacidadFiltro < 0.005) return;

    // Frustum culling en espacio-pantalla
    const sx = (this.x - cam.x) * cam.scale + W / 2;
    const sy = (this.y - cam.y) * cam.scale + H / 2;
    const sr = RADIO_BASE * cam.scale + 5;
    if (sx + sr < 0 || sx - sr > W || sy + sr < 0 || sy - sr > H) return;

    const respProp = Math.sin(this.fase) * 2.5;
    const respGlob = resp * 3.5;
    const radio = Math.max(1.5, RADIO_BASE + respProp + respGlob);
    const pOpac = 1 + resp * 0.08;
    const fade = Math.min(1, this.edad / 5000);
    const op = OPACIDAD_BASE * fade * pOpac * this.opacidadFiltro;

    // Gradiente raised cosine: derivada cero en los extremos → sin anillos visibles
    const { r, g, b } = this.rgb;
    const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, radio);
    grd.addColorStop(0,    `rgba(${r},${g},${b},${op * 1.000})`);
    grd.addColorStop(0.1,  `rgba(${r},${g},${b},${op * 0.976})`);
    grd.addColorStop(0.2,  `rgba(${r},${g},${b},${op * 0.905})`);
    grd.addColorStop(0.3,  `rgba(${r},${g},${b},${op * 0.794})`);
    grd.addColorStop(0.4,  `rgba(${r},${g},${b},${op * 0.655})`);
    grd.addColorStop(0.5,  `rgba(${r},${g},${b},${op * 0.500})`);
    grd.addColorStop(0.6,  `rgba(${r},${g},${b},${op * 0.345})`);
    grd.addColorStop(0.7,  `rgba(${r},${g},${b},${op * 0.206})`);
    grd.addColorStop(0.8,  `rgba(${r},${g},${b},${op * 0.095})`);
    grd.addColorStop(0.9,  `rgba(${r},${g},${b},${op * 0.024})`);
    grd.addColorStop(1,    `rgba(${r},${g},${b},0)`);

    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(this.x, this.y, radio, 0, Math.PI * 2);
    ctx.fill();
  }

  contieneEnMundo(wx, wy) {
    const dx = wx - this.x;
    const dy = wy - this.y;
    const r = RADIO_BASE * 0.6;
    return dx * dx + dy * dy < r * r;
  }
}

// ============================================================
// ESTADO GLOBAL
// ============================================================
const pintitas = [];
const pintitasMap = new Map();

let tiempoGlobal = 0;
let ultimoTiempo = performance.now();

let mouseVel = 0;
let mousePrevX = null, mousePrevY = null;
let ultimoMouseTime = performance.now();
let hoverWorldX = null, hoverWorldY = null;

// ============================================================
// RENDER LOOP
// ============================================================
function render() {
  const ahora = performance.now();
  const dt = Math.min(50, ahora - ultimoTiempo);
  ultimoTiempo = ahora;
  tiempoGlobal += dt;

  // Suavizar cámara
  const lerp = 0.1;
  cam.x += (cam.tx - cam.x) * lerp;
  cam.y += (cam.ty - cam.y) * lerp;
  cam.scale += (cam.tscale - cam.scale) * lerp;

  // Decaimiento de velocidad del mouse
  mouseVel *= Math.pow(0.92, dt / 16);

  // Respiración global
  const resp = Math.sin(tiempoGlobal * 0.00045);

  // Actualizar zonas (islas que se mueven)
  actualizarZonas(tiempoGlobal);

  // Centroides de color
  const centroides = calcularCentroides();

  // Fade en espacio-pantalla (antes del transform)
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'rgba(3, 3, 3, 0.09)';
  ctx.fillRect(0, 0, W, H);

  // Transform de cámara: todo lo que se dibuja a partir de aquí es en espacio-mundo
  ctx.save();
  ctx.translate(W / 2 - cam.x * cam.scale, H / 2 - cam.y * cam.scale);
  ctx.scale(cam.scale, cam.scale);
  ctx.globalCompositeOperation = 'screen';

  for (const p of pintitas) {
    p.recalcularBase();
    p.actualizar(dt, hoverWorldX, hoverWorldY, mouseVel, centroides);
    p.dibujar(ctx, resp);
  }

  ctx.restore();
  ctx.globalCompositeOperation = 'source-over';

  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// ============================================================
// CONTROLES DE ZOOM Y PAN
// ============================================================
let isDragging = false;
let dragStartSX = 0, dragStartSY = 0;
let camStartX = 0, camStartY = 0;
let dragDistance = 0;

// WHEEL (mouse + trackpad pinch)
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = Math.exp(-e.deltaY * 0.0015);
  const newScale = Math.max(cam.MIN_SCALE, Math.min(cam.MAX_SCALE, cam.tscale * factor));

  // Zoom centrado en la posición del cursor
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const wx = (sx - W / 2) / cam.tscale + cam.tx;
  const wy = (sy - H / 2) / cam.tscale + cam.ty;

  cam.tscale = newScale;
  cam.tx = wx - (sx - W / 2) / newScale;
  cam.ty = wy - (sy - H / 2) / newScale;
}, { passive: false });

// MOUSE DRAG (pan)
canvas.addEventListener('mousedown', (e) => {
  isDragging = true;
  dragDistance = 0;
  dragStartSX = e.clientX;
  dragStartSY = e.clientY;
  camStartX = cam.tx;
  camStartY = cam.ty;
});

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;

  // Velocidad del mouse en píxeles de pantalla por segundo
  if (mousePrevX !== null) {
    const ahora = performance.now();
    const dt = Math.max(1, ahora - ultimoMouseTime);
    const dx = sx - mousePrevX, dy = sy - mousePrevY;
    const v = Math.sqrt(dx * dx + dy * dy) / dt * 1000;
    mouseVel = mouseVel * 0.6 + v * 0.4;
    ultimoMouseTime = ahora;
  }
  mousePrevX = sx; mousePrevY = sy;
  const w = screenToWorld(sx, sy);
  hoverWorldX = w.x; hoverWorldY = w.y;

  if (isDragging) {
    const dx = e.clientX - dragStartSX;
    const dy = e.clientY - dragStartSY;
    dragDistance += Math.abs(dx) + Math.abs(dy);
    cam.tx = camStartX - dx / cam.scale;
    cam.ty = camStartY - dy / cam.scale;
    // Actualizar inicio para movimiento relativo
    dragStartSX = e.clientX;
    dragStartSY = e.clientY;
    camStartX = cam.tx;
    camStartY = cam.ty;
  }
});

canvas.addEventListener('mouseup', async (e) => {
  isDragging = false;
  if (dragDistance < 6) {
    // Click real: abrir relato
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;
    const w = screenToWorld(sx, sy);
    let target = null, best = Infinity;
    for (const p of pintitas) {
      if (p.contieneEnMundo(w.x, w.y)) {
        const dx = w.x - p.x, dy = w.y - p.y;
        const d = dx * dx + dy * dy;
        if (d < best) { best = d; target = p; }
      }
    }
    if (target) await abrirRelato(target.respuestaId);
  }
});
canvas.addEventListener('mouseleave', () => {
  isDragging = false;
  hoverWorldX = null;
  hoverWorldY = null;
  mouseVel = 0;
});

// TOUCH (pinch + pan + tap)
let touches = {};
let lastPinchDist = 0;
let touchPanStartX = 0, touchPanStartY = 0;
let camTouchStartX = 0, camTouchStartY = 0;
let touchDragDist = 0;
let pinchActivo = false;

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  pinchActivo = e.touches.length >= 2;
  touchDragDist = 0;

  if (e.touches.length === 1) {
    const t = e.touches[0];
    touchPanStartX = t.clientX;
    touchPanStartY = t.clientY;
    camTouchStartX = cam.tx;
    camTouchStartY = cam.ty;
    const rect = canvas.getBoundingClientRect();
    const sx = t.clientX - rect.left, sy = t.clientY - rect.top;
    const w = screenToWorld(sx, sy);
    hoverWorldX = w.x; hoverWorldY = w.y;
  }

  if (e.touches.length >= 2) {
    const t1 = e.touches[0], t2 = e.touches[1];
    const dx = t2.clientX - t1.clientX, dy = t2.clientY - t1.clientY;
    lastPinchDist = Math.sqrt(dx * dx + dy * dy);
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();

  if (e.touches.length >= 2) {
    pinchActivo = true;
    const t1 = e.touches[0], t2 = e.touches[1];
    const dx = t2.clientX - t1.clientX, dy = t2.clientY - t1.clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const factor = dist / lastPinchDist;
    const newScale = Math.max(cam.MIN_SCALE, Math.min(cam.MAX_SCALE, cam.tscale * factor));
    const cx = (t1.clientX + t2.clientX) / 2;
    const cy = (t1.clientY + t2.clientY) / 2;
    const wx = (cx - W / 2) / cam.tscale + cam.tx;
    const wy = (cy - H / 2) / cam.tscale + cam.ty;
    cam.tscale = newScale;
    cam.tx = wx - (cx - W / 2) / newScale;
    cam.ty = wy - (cy - H / 2) / newScale;
    lastPinchDist = dist;
  } else if (e.touches.length === 1 && !pinchActivo) {
    const t = e.touches[0];
    const ddx = t.clientX - touchPanStartX;
    const ddy = t.clientY - touchPanStartY;
    touchDragDist += Math.abs(ddx) + Math.abs(ddy);

    // Pan
    cam.tx = camTouchStartX - ddx / cam.scale;
    cam.ty = camTouchStartY - ddy / cam.scale;

    // Velocidad para agitación
    const rect = canvas.getBoundingClientRect();
    const sx = t.clientX - rect.left, sy = t.clientY - rect.top;
    if (mousePrevX !== null) {
      const ahora = performance.now();
      const dt = Math.max(1, ahora - ultimoMouseTime);
      const vx = sx - mousePrevX, vy = sy - mousePrevY;
      const v = Math.sqrt(vx * vx + vy * vy) / dt * 1000;
      mouseVel = mouseVel * 0.6 + v * 0.4;
      ultimoMouseTime = ahora;
    }
    mousePrevX = sx; mousePrevY = sy;
    const w = screenToWorld(sx, sy);
    hoverWorldX = w.x; hoverWorldY = w.y;
  }
}, { passive: false });

canvas.addEventListener('touchend', async (e) => {
  if (e.touches.length === 0) {
    if (!pinchActivo && touchDragDist < 10) {
      // Tap: abrir relato
      let target = null, best = Infinity;
      for (const p of pintitas) {
        if (hoverWorldX !== null && p.contieneEnMundo(hoverWorldX, hoverWorldY)) {
          const dx = hoverWorldX - p.x, dy = hoverWorldY - p.y;
          const d = dx * dx + dy * dy;
          if (d < best) { best = d; target = p; }
        }
      }
      if (target) await abrirRelato(target.respuestaId);
    }
    pinchActivo = false;
    setTimeout(() => { hoverWorldX = null; hoverWorldY = null; }, 500);
  }
  if (e.touches.length === 1 && !pinchActivo) {
    const t = e.touches[0];
    touchPanStartX = t.clientX;
    touchPanStartY = t.clientY;
    camTouchStartX = cam.tx;
    camTouchStartY = cam.ty;
  }
}, { passive: false });

// ============================================================
// MODAL
// ============================================================
async function abrirRelato(respuestaId) {
  try {
    const res = await fetch(`${API_BASE}/relato/${respuestaId}`);
    const data = await res.json();
    if (data.status === 'error') return;
    document.getElementById('modal-texto').textContent = data.relato || '(sin contenido)';
    const cats = data.categorias_activadas || {};
    document.getElementById('modal-cats').innerHTML = Object.keys(cats).map(cat => {
      const info = CATEGORIAS[cat] || { color: '#888', nombre: cat };
      return `<span class="modal-cat-chip" style="background:${info.color}">${info.nombre}</span>`;
    }).join('');
    document.getElementById('modal').classList.add('activo');
  } catch(e) { console.error(e); }
}
function cerrarModal() { document.getElementById('modal').classList.remove('activo'); }
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') cerrarModal();
});
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') cerrarModal(); });

// ============================================================
// LEYENDA INTERACTIVA
// ============================================================
function clickCategoria(cat, soloEsta) {
  if (soloEsta) {
    const yaEsSolo = filtrosActivos[cat] &&
      Object.entries(filtrosActivos).every(([k, v]) => k === cat ? v : !v);
    if (yaEsSolo) {
      for (const k of Object.keys(filtrosActivos)) filtrosActivos[k] = true;
    } else {
      for (const k of Object.keys(filtrosActivos)) filtrosActivos[k] = (k === cat);
    }
  } else {
    filtrosActivos[cat] = !filtrosActivos[cat];
  }
  for (const p of pintitas) {
    p.opacidadFiltroObjetivo = filtrosActivos[p.categoria] ? 1 : 0;
  }
  actualizarLeyenda();
}

function actualizarLeyenda() {
  const cont = document.getElementById('leyenda');
  cont.innerHTML = Object.entries(CATEGORIAS).map(([k, v]) => {
    const cls = filtrosActivos[k] ? '' : ' apagado';
    return `<div class="leyenda-item${cls}" data-cat="${k}" role="button" tabindex="0" title="Click: ocultar · Shift+click: aislar">
      <span class="leyenda-dot" style="background:${v.color}"></span>${v.nombre}
    </div>`;
  }).join('');
  cont.querySelectorAll('.leyenda-item').forEach(el => {
    el.addEventListener('click', (e) => clickCategoria(el.dataset.cat, e.shiftKey));
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault(); clickCategoria(el.dataset.cat, e.shiftKey);
      }
    });
  });
}
actualizarLeyenda();

// ============================================================
// CONEXIÓN AL SERVIDOR
// ============================================================
let ultimaPintitaId = 0;

async function inicializar() {
  try {
    const res = await fetch(`${API_BASE}/pintitas_recientes?n=2000`);
    const data = await res.json();
    totalRelatos = data.length > 0 ? Math.max(64, Math.round(data.length / 3.5)) : 64;
    data.reverse();
    for (const p of data) {
      if (!pintitasMap.has(p.id)) {
        pintitas.push(new Pintita(p.id, p.respuesta_id, p.categoria));
        pintitasMap.set(p.id, true);
        if (p.id > ultimaPintitaId) ultimaPintitaId = p.id;
      }
    }
    actualizarEstado();
    // Ajustar cámara después de cargar
    setTimeout(ajustarCamaraGalaxia, 200);
  } catch(e) {
    console.error(e);
    marcarSinConexion();
  }
}

async function consultarNuevas() {
  try {
    const res = await fetch(`${API_BASE}/pintitas_recientes?n=100`);
    const data = await res.json();
    const nuevas = data.filter(p => p.id > ultimaPintitaId);
    nuevas.reverse();
    for (const p of nuevas) {
      if (!pintitasMap.has(p.id)) {
        setTimeout(() => {
          pintitas.push(new Pintita(p.id, p.respuesta_id, p.categoria, true));
          pintitasMap.set(p.id, true);
        }, Math.random() * 1500);
        if (p.id > ultimaPintitaId) ultimaPintitaId = p.id;
      }
    }
    actualizarEstado();
  } catch(e) { marcarSinConexion(); }
}

async function actualizarEstado() {
  try {
    const res = await fetch(`${API_BASE}/estado`);
    const data = await res.json();
    totalRelatos = data.total_respuestas || totalRelatos;
    document.getElementById('n-respuestas').textContent = data.total_respuestas;
    document.getElementById('estado-dot').classList.add('vivo');
    document.getElementById('estado-texto').textContent = 'corpus activo';
  } catch(e) { marcarSinConexion(); }
}

function marcarSinConexion() {
  document.getElementById('estado-dot').classList.remove('vivo');
  document.getElementById('estado-texto').textContent = 'sin conexión';
}

inicializar();
setInterval(consultarNuevas, POLL_INTERVAL);

// ============================================================
// SHAKE DEL TELÉFONO
// ============================================================
let ultimoShake = 0, motionActivo = false;

function activarMovimiento() {
  if (motionActivo) return;
  motionActivo = true;
  window.addEventListener('devicemotion', (e) => {
    const acc = e.accelerationIncludingGravity || e.acceleration;
    if (!acc) return;
    const ax = acc.x || 0, ay = acc.y || 0, az = acc.z || 0;
    const mag = Math.sqrt(ax*ax + ay*ay + az*az);
    if (mag > 18) {
      const ahora = performance.now();
      if (ahora - ultimoShake > 200) {
        ultimoShake = ahora;
        const inten = Math.min(8, (mag - 18) * 0.6);
        for (const p of pintitas) {
          const dx = p.x - cam.x, dy = p.y - cam.y;
          const dist = Math.sqrt(dx*dx + dy*dy) || 1;
          p.ovx += (dx / dist) * inten;
          p.ovy += (dy / dist) * inten;
          p.tiempoAgitacion = DURACION_AGITACION;
        }
      }
    }
  });
  const btn = document.getElementById('btn-motion');
  if (btn) btn.style.display = 'none';
}

const esTouch = 'ontouchstart' in window;
const necesitaPermiso = typeof DeviceMotionEvent !== 'undefined' &&
  typeof DeviceMotionEvent.requestPermission === 'function';

if (esTouch) {
  if (necesitaPermiso) {
    const btn = document.createElement('button');
    btn.id = 'btn-motion';
    btn.textContent = 'tocar para activar movimiento';
    btn.style.cssText = `position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      background:rgba(20,20,20,0.9);color:#ccc;border:0.5px solid #444;
      padding:1rem 1.5rem;font-family:'Space Mono',monospace;font-size:11px;
      letter-spacing:0.15em;cursor:pointer;z-index:200;backdrop-filter:blur(8px);`;
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      try {
        const resp = await DeviceMotionEvent.requestPermission();
        if (resp === 'granted') activarMovimiento();
        else { btn.textContent = 'permiso denegado'; setTimeout(() => btn.style.display='none', 2000); }
      } catch(err) { btn.style.display = 'none'; }
    });
    document.body.appendChild(btn);
  } else if (typeof DeviceMotionEvent !== 'undefined') {
    activarMovimiento();
  }
}
</script>
